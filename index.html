<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inferno Admin | V9.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 40px; }
        .section-box { background: #111; padding: 24px; border-radius: 20px; border: 1px solid #222; margin-bottom: 24px; position: relative; }
        .section-title { font-size: 14px; font-weight: 900; color: #ea580c; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; margin-top: 15px; }
        input[type="text"], input[type="number"] { background: #000 !important; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white !important; width: 100%; font-size: 13px; outline: none; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; cursor: pointer; background: none; }
        .nav-tab { cursor: pointer; padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 12px; transition: 0.3s; color: #555; }
        .nav-tab.active { background: #ea580c; color: white; }
        .sort-list { background: #080808; border-radius: 12px; padding: 10px; min-height: 80px; border: 1px solid #222; margin-top: 8px; }
        .sort-item { background: #1a1a1a; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; font-size: 11px; }
        .btn-add { background: #ea580c; color: white; padding: 0 20px; border-radius: 8px; font-weight: 900; cursor: pointer; height: 42px; }
        .mini-refresh { cursor: pointer; color: #ea580c; font-size: 12px; margin-left: 8px; vertical-align: middle; }
        .hidden { display: none; }
        .log-entry { font-family: monospace; font-size: 11px; padding: 8px; border-bottom: 1px solid #222; }
        .log-user { color: #ea580c; font-weight: bold; }
        .log-time { color: #555; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="login-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-10 rounded-[30px] border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-3xl font-black italic text-orange-600 mb-6 uppercase">Inferno Auth</h2>
            <button id="loginBtn" class="w-full py-4 bg-orange-600 rounded-xl font-black uppercase">Sign in with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase tracking-tighter">Inferno Dashboard</h1>
            <div class="flex gap-2 bg-[#111] p-1.5 rounded-xl border border-zinc-800">
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab active">CONFIG</button>
                <button onclick="switchTab('vote')" id="tab-vote" class="nav-tab">VOTING</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab">ACTIVITY</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab">EMAILS</button>
            </div>
        </div>

        <div id="page-config">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-box">
                    <h2 class="section-title">Visual Branding</h2>
                    <label>Background URL <span class="mini-refresh" onclick="syncField('bgImageUrl')">↻</span></label><input type="text" id="bgImageUrl">
                    <label>Logo Icon URL <span class="mini-refresh" onclick="syncField('logoUrl')">↻</span></label><input type="text" id="logoUrl">
                    <div class="grid grid-cols-4 gap-2 mt-4 text-center">
                        <div><label>Nav</label><input type="color" id="navBg" onchange="syncField('navBg')"></div>
                        <div><label>Logo</label><input type="color" id="navLogoCol" onchange="syncField('navLogoCol')"></div>
                        <div><label>Hero</label><input type="color" id="heroTitleCol" onchange="syncField('heroTitleCol')"></div>
                        <div><label>Btn</label><input type="color" id="heroBtnBg" onchange="syncField('heroBtnBg')"></div>
                    </div>
                </div>
                <div class="section-box">
                    <h2 class="section-title">Hero & Media</h2>
                    <label>Hero Title <span class="mini-refresh" onclick="syncField('heroTitle')">↻</span></label><input type="text" id="heroTitle">
                    <label>Server IP <span class="mini-refresh" onclick="syncField('serverIp')">↻</span></label><input type="text" id="serverIp">
                    <label>Media <span class="mini-refresh" onclick="syncList('media-list', 'mediaUrls')">↻</span></label>
                    <div class="flex gap-2"><input type="text" id="mediaInput" placeholder="Add Link..."><button id="mediaAdd" class="btn-add">+</button></div>
                    <div id="media-list" class="sort-list"></div>
                </div>
            </div>

            <div class="section-box">
                <h2 class="section-title">Sponsorships & Store</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Sponsor Name <span class="mini-refresh" onclick="syncField('sponsorName')">↻</span></label><input type="text" id="sponsorName"></div>
                    <div><label>Sponsor URL <span class="mini-refresh" onclick="syncField('sponsorUrl')">↻</span></label><input type="text" id="sponsorUrl"></div>
                    <div><label>Promo Code <span class="mini-refresh" onclick="syncField('promoCode')">↻</span></label><input type="text" id="promoCode"></div>
                    <div><label>Discord Link <span class="mini-refresh" onclick="syncField('discordLink')">↻</span></label><input type="text" id="discordLink"></div>
                    <div class="col-span-2"><label>Patreon Link <span class="mini-refresh" onclick="syncField('patreonBtnLink')">↻</span></label><input type="text" id="patreonBtnLink"></div>
                </div>
            </div>

            <div class="section-box">
                <h2 class="section-title">Public Lists</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><label>SMP <span class="mini-refresh" onclick="syncList('smp-list', 'smpList')">↻</span></label><div class="flex gap-2"><input type="text" id="smpInput"><button id="smpAdd" class="btn-add">+</button></div><div id="smp-list" class="sort-list"></div></div>
                    <div><label>Events <span class="mini-refresh" onclick="syncList('event-list', 'eventList')">↻</span></label><div class="flex gap-2"><input type="text" id="eventInput"><button id="eventAdd" class="btn-add">+</button></div><div id="event-list" class="sort-list"></div></div>
                    <div><label>Staff <span class="mini-refresh" onclick="syncList('staff-list', 'staffList')">↻</span></label><div class="flex gap-2"><input type="text" id="staffInput"><button id="staffAdd" class="btn-add">+</button></div><div id="staff-list" class="sort-list"></div></div>
                </div>
            </div>
        </div>

        <div id="page-vote" class="hidden">
            <div class="section-box">
                <h2 class="section-title">Vote Site Management</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                    <div><label>Site Name</label><input type="text" id="voteNameInput" placeholder="e.g. Planet Minecraft"></div>
                    <div><label>Voting URL</label><div class="flex gap-2"><input type="text" id="voteInput" placeholder="https://..."><button id="voteAdd" class="btn-add px-8">ADD SITE</button></div></div>
                </div>
                <div class="mt-10">
                    <label>Active Sites <span class="mini-refresh" onclick="syncList('vote-list', 'voteLinks')">↻ SAVE VOTES</span></label>
                    <div id="vote-list" class="sort-list"></div>
                </div>
            </div>
        </div>

        <div id="page-logs" class="hidden">
            <div class="section-box">
                <h2 class="section-title">Recent Activity</h2>
                <div id="log-container" class="mt-4 h-[500px] overflow-y-auto bg-black/50 rounded-xl p-4 border border-zinc-800"></div>
            </div>
        </div>

        <div id="page-access" class="hidden">
            <div class="section-box">
                <h2 class="section-title">Whitelisted Emails</h2>
                <div class="flex gap-2 mt-4">
                    <input type="text" id="emailInput">
                    <button id="emailAdd" class="btn-add">+</button>
                </div>
                <label>Access List <span class="mini-refresh" onclick="syncList('email-list', 'trustedEmails')">↻ SAVE EMAILS</span></label>
                <div id="email-list" class="sort-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, limitToLast, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
            authDomain: "inferno-realms.firebaseapp.com",
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
            projectId: "inferno-realms",
            appId: "1:669014530995:web:41fd088f6255118c9e89c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const ownerEmail = "abeedwehbe@gmail.com";
        let currentUser = null;

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'absoluteConfigV3/trustedEmails'));
                const trusted = (snap.val() || "").split(',').filter(e => e);
                if (user.email === ownerEmail || trusted.includes(user.email)) {
                    currentUser = user;
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    syncEverything();
                    setupLogs();
                } else { alert("Unauthorized."); auth.signOut(); }
            }
        });

        const addLog = async (action) => {
            if (!currentUser) return;
            await push(ref(db, 'absoluteConfigV3/logs'), {
                user: currentUser.email,
                action: action,
                time: new Date().toISOString() // Standard format for cross-timezone conversion
            });
        };

        const setupLogs = () => {
            onValue(query(ref(db, 'absoluteConfigV3/logs'), limitToLast(50)), (snap) => {
                const container = document.getElementById('log-container');
                container.innerHTML = "";
                const data = snap.val();
                if (data) {
                    Object.values(data).reverse().forEach(log => {
                        // LOCAL TIME FIX HERE
                        const localTime = new Date(log.time).toLocaleString([], { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
                        container.innerHTML += `<div class="log-entry"><span class="log-time">[${localTime}]</span> <span class="log-user">${log.user.split('@')[0]}</span>: <span class="text-zinc-300">${log.action}</span></div>`;
                    });
                }
            });
        };

        window.syncField = async (id) => {
            const val = document.getElementById(id).value;
            await set(ref(db, `absoluteConfigV3/${id}`), val);
            addLog(`Changed ${id}`);
            alert("Saved!");
        };

        window.syncList = async (listId, key) => {
            let items;
            if (listId === 'vote-list') {
                items = Array.from(document.getElementById(listId).querySelectorAll('.sort-item')).map(item => `${item.querySelector('.site-name').innerText}|${item.querySelector('.site-url').innerText}`).join(',');
            } else {
                items = Array.from(document.getElementById(listId).querySelectorAll('span')).map(s => s.innerText).join(',');
            }
            await set(ref(db, `absoluteConfigV3/${key}`), items);
            addLog(`Updated ${key}`);
            alert("Saved!");
        };

        const addItem = (listId, val) => {
            const div = document.createElement('div');
            div.className = 'sort-item';
            let display = val;
            if (listId === 'vote-list' && val.includes('|')) {
                const [n, u] = val.split('|');
                display = `<span class="site-name font-bold text-orange-500">${n}</span> <span class="site-url opacity-40 ml-2">${u}</span>`;
            } else if (listId === 'vote-list') {
                display = `<span class="site-name font-bold text-orange-500">Legacy</span> <span class="site-url opacity-40 ml-2">${val}</span>`;
            } else { display = `<span>${val}</span>`; }
            div.innerHTML = `<div>${display}</div><button class="text-red-500 font-bold px-2" onclick="this.parentElement.remove()">×</button>`;
            document.getElementById(listId).appendChild(div);
        };

        ['media', 'smp', 'event', 'staff', 'email'].forEach(x => {
            const btn = document.getElementById(x + 'Add');
            if(btn) btn.onclick = () => { addItem(x + '-list', document.getElementById(x + 'Input').value); document.getElementById(x + 'Input').value = ''; };
        });

        document.getElementById('voteAdd').onclick = () => {
            const n = document.getElementById('voteNameInput').value, u = document.getElementById('voteInput').value;
            if(n && u) { addItem('vote-list', `${n}|${u}`); document.getElementById('voteNameInput').value = ''; document.getElementById('voteInput').value = ''; }
        };

        const syncEverything = async () => {
            const snap = await get(ref(db, 'absoluteConfigV3'));
            const d = snap.val(); if (!d) return;
            ["bgImageUrl", "logoUrl", "navBg", "navLogoCol", "heroTitleCol", "heroBtnBg", "heroTitle", "serverIp", "sponsorName", "sponsorUrl", "promoCode", "patreonBtnLink", "discordLink"].forEach(f => { if(d[f]) document.getElementById(f).value = d[f]; });
            const listMap = { 'media-list': 'mediaUrls', 'smp-list': 'smpList', 'event-list': 'eventList', 'staff-list': 'staffList', 'email-list': 'trustedEmails', 'vote-list': 'voteLinks' };
            Object.entries(listMap).forEach(([id, key]) => {
                document.getElementById(id).innerHTML = "";
                if(d[key]) d[key].split(',').forEach(v => v.trim() && addItem(id, v.trim()));
            });
        };

        window.switchTab = (id) => {
            ['config', 'vote', 'logs', 'access'].forEach(t => {
                document.getElementById('page-'+t).classList.toggle('hidden', t !== id);
                document.getElementById('tab-'+t).classList.toggle('active', t === id);
            });
        };

        ['media-list', 'smp-list', 'event-list', 'staff-list', 'vote-list', 'email-list'].forEach(id => {
            const el = document.getElementById(id); if(el) new Sortable(el, { animation: 150 });
        });
    </script>
</body>
</html>
