<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inferno Dashboard | Master Admin V26.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        :root {
            --orange-primary: #ea580c;
            --bg-dark: #0a0a0a;
            --card-bg: #111111;
            --border-color: #1f1f1f;
            --input-bg: #000000;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 40px;
            margin: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-header {
            font-size: 38px;
            font-weight: 900;
            font-style: italic;
            color: var(--orange-primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(234, 88, 12, 0.2);
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            position: relative;
            transition: border-color 0.3s ease;
        }

        .section-title {
            color: var(--orange-primary);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after {
            content: '';
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--orange-primary), transparent);
            opacity: 0.3;
        }

        label {
            font-size: 11px;
            font-weight: 900;
            color: #555;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
            margin-top: 22px;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea, select {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            color: #ffffff !important;
            width: 100%;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--orange-primary);
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.15);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid var(--border-color);
            width: 100%;
            height: 50px;
            cursor: pointer;
            background: #000;
            border-radius: 10px;
            padding: 5px;
        }

        .btn-orange {
            background: var(--orange-primary);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-orange:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-save-secondary {
            background: #1a1a1a;
            color: var(--orange-primary);
            border: 1px solid rgba(234, 88, 12, 0.3);
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            margin-top: 25px;
            cursor: pointer;
        }

        .role-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .icon-grid {
            display: grid;
            grid-template-cols: repeat(auto-fill, minmax(35px, 1fr));
            gap: 8px;
            background: #000;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            max-height: 200px;
            overflow-y: auto;
        }

        .icon-box {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            color: #444;
            transition: 0.2s;
        }

        .icon-box i { width: 16px; height: 16px; }
        .icon-box:hover { color: var(--orange-primary); background: #111; }
        .icon-box.selected { background: var(--orange-primary); color: white; }

        .nav-tab {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            color: #777;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            background: transparent;
        }

        .nav-tab.active { background: var(--orange-primary); color: white; }

        .sort-list { background: #080808; border-radius: 12px; padding: 15px; margin-top: 15px; min-height: 60px; border: 1px dashed #222; }
        .sort-item { background: #141414; border: 1px solid var(--border-color); margin-bottom: 10px; padding: 14px 20px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; }

        #edit-hud {
            background: #ea580c10;
            border: 1px solid var(--orange-primary);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            font-weight: bold;
            color: var(--orange-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-16 rounded-[50px] border border-zinc-800 text-center">
            <h2 class="dashboard-header mb-12">Inferno</h2>
            <button id="loginBtn" class="btn-orange">Authenticate with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        
        <div class="flex flex-wrap justify-between items-center mb-12 gap-8">
            <div class="dashboard-header">Inferno Dashboard</div>
            <nav id="nav-container" class="flex flex-wrap gap-2 bg-[#111] p-2 rounded-2xl border border-zinc-800 shadow-xl">
                <button onclick="switchTab('profile')" id="tab-profile" class="nav-tab active">My Profile</button>
                <button onclick="switchTab('directory')" id="tab-directory" class="nav-tab hidden">Directory</button>
                <button onclick="switchTab('roles')" id="tab-roles" class="nav-tab hidden">Roles</button>
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab hidden">Config</button>
                <button onclick="switchTab('vote')" id="tab-vote" class="nav-tab hidden">Voting</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab hidden">Activity</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab hidden">Emails</button>
            </nav>
        </div>

        <div id="page-profile">
            <div class="max-w-2xl mx-auto section-card">
                <div id="edit-hud" class="hidden">
                    <span>MODE: OVERRIDE STAFF ENTRY</span>
                    <button onclick="cancelOverride()" class="text-white bg-red-600 px-3 py-1 rounded">X</button>
                </div>
                <div class="section-title" id="profile-title-text">Personal Bio Editor</div>
                <label>Display Name</label><input type="text" id="myStaffName">
                <label>Assigned Role</label><select id="myStaffRoleDropdown"></select>
                <label>Biography / About Me</label><textarea id="myStaffBio" rows="10"></textarea>
                <button onclick="saveCurrentProfile()" class="btn-orange mt-10" id="save-profile-btn">Save My Profile</button>
            </div>
        </div>

        <div id="page-config" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="section-card">
                    <div class="section-title">Visual Branding</div>
                    <label>Background Image URL</label><input type="text" id="bgImageUrl">
                    <label>Logo Icon URL</label><input type="text" id="logoUrl">
                    <div class="grid grid-cols-4 gap-4 mt-4">
                        <div><label>Nav BG</label><input type="color" id="navBg"></div>
                        <div><label>Logo Col</label><input type="color" id="navLogoCol"></div>
                        <div><label>Hero Text</label><input type="color" id="heroTitleCol"></div>
                        <div><label>Accent</label><input type="color" id="heroBtnBg"></div>
                    </div>
                    <button onclick="saveBranding()" class="btn-save-secondary mt-8">Save Visuals</button>
                </div>
                <div class="section-card">
                    <div class="section-title">Hero & Media</div>
                    <label>Hero Title</label><input type="text" id="heroTitle">
                    <label>Server IP</label><input type="text" id="serverIp">
                    <button onclick="saveHeroInfo()" class="btn-save-secondary">Save Hero Info</button>
                    <label class="mt-6">Media Carousel</label>
                    <div class="flex gap-3"><input type="text" id="mediaInput"><button id="mediaAdd" class="btn-orange !w-12">+</button></div>
                    <div id="media-list" class="sort-list"></div>
                    <button onclick="syncList('media-list', 'mediaUrls')" class="btn-save-secondary">Save Media Order</button>
                </div>
                <div class="section-card lg:col-span-2">
                    <div class="section-title">Partner & Social</div>
                    <div class="grid grid-cols-2 gap-8">
                        <div><label>Sponsor Name</label><input type="text" id="sponsorName"><label>Promo Code</label><input type="text" id="promoCode"></div>
                        <div><label>Sponsor URL</label><input type="text" id="sponsorUrl"><label>Discord Link</label><input type="text" id="discordLink"></div>
                    </div>
                    <label>Support Link</label><input type="text" id="patreonBtnLink">
                    <button onclick="savePartnerSocial()" class="btn-orange mt-8">Update Partnerships</button>
                </div>
            </div>
        </div>

        <div id="page-roles" class="hidden">
            <div class="section-card max-w-5xl mx-auto">
                <div class="section-title">Role Configuration</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <label>Role Name</label><input type="text" id="roleTitleInput" oninput="updatePreview()">
                        <label>Accent Color</label><input type="color" id="roleColorInput" value="#ea580c" oninput="updatePreview()">
                        <label>Identity Preview</label>
                        <div class="p-8 bg-black rounded-xl border border-zinc-900 flex justify-center">
                            <div id="role-preview-pill" class="role-pill">
                                <i id="preview-icon-el" data-lucide="shield"></i>
                                <span id="preview-text-el">New Role</span>
                            </div>
                        </div>
                        <button id="roleAddBtn" class="btn-orange mt-8">Add Role</button>
                    </div>
                    <div>
                        <label>Compact Icon Library (Lucide)</label>
                        <div class="icon-grid" id="icon-picker"></div>
                    </div>
                </div>
                <div id="role-list" class="sort-list mt-10"></div>
                <button onclick="syncList('role-list', 'networkRoles')" class="btn-save-secondary">Sync Global Roles</button>
            </div>
        </div>

        <div id="page-directory" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-8" id="directory-container"></div>
        </div>

        <div id="page-logs" class="hidden">
            <div class="section-card">
                <div class="section-title">Audit Log</div>
                <div id="log-container" class="bg-black p-8 rounded-2xl h-[600px] overflow-y-auto font-mono text-[11px] text-zinc-400"></div>
            </div>
        </div>

        <div id="page-access" class="hidden grid grid-cols-1 md:grid-cols-2 gap-10 max-w-6xl mx-auto">
            <div class="section-card">
                <div class="section-title">Staff Access</div>
                <div class="flex gap-2">
                    <input type="text" id="bioEmailInput" placeholder="Enter staff email...">
                    <button id="bioEmailAdd" class="btn-orange !w-12">+</button>
                </div>
                <div id="bio-email-list" class="sort-list"></div>
                <button onclick="syncList('bio-email-list', 'bioStaffEmails')" class="btn-save-secondary">Sync Staff</button>
            </div>
            <div class="section-card">
                <div class="section-title">Admin Whitelist</div>
                <div class="flex gap-2">
                    <input type="text" id="adminEmailInput" placeholder="Enter admin email...">
                    <button id="adminEmailAdd" class="btn-orange !w-12">+</button>
                </div>
                <div id="admin-email-list" class="sort-list"></div>
                <button onclick="syncList('admin-email-list', 'trustedEmails')" class="btn-save-secondary">Sync Admins</button>
            </div>
        </div>

        <div id="page-vote" class="hidden max-w-2xl mx-auto section-card">
            <div class="section-title">Voting Links</div>
            <div class="flex gap-2"><input type="text" id="voteInput"><button id="voteAdd" class="btn-orange !w-12">+</button></div>
            <div id="vote-list" class="sort-list"></div>
            <button onclick="syncList('vote-list', 'voteLinks')" class="btn-save-secondary">Sync Voting</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc", authDomain: "inferno-realms.firebaseapp.com", 
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/", projectId: "inferno-realms", appId: "1:669014530995:web:41fd088f6255118c9e89c6" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const MASTER_EMAIL = "abeedwehbe@gmail.com";
        let currentUser = null, userIsAdmin = false, myKey = "", selIcon = "shield", selColor = "#ea580c";
        let targetOverrideKey = null;

        const lucideIcons = ['crown', 'shield', 'gavel', 'star', 'swords', 'zap', 'flame', 'skull', 'gem', 'wrench', 'bot', 'code', 'palette', 'globe', 'link', 'heart', 'lock', 'settings', 'info', 'alert-triangle', 'user-cog', 'users', 'terminal', 'hammer', 'rocket', 'target', 'map', 'camera', 'mic', 'music', 'ghost', 'diamond', 'sword', 'axe', 'pickaxe', 'compass', 'crosshair', 'anchor', 'database', 'cpu', 'wifi', 'activity', 'eye', 'search', 'mail', 'phone', 'gift', 'flag'];

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            const snap = await get(ref(db, 'absoluteConfigV3'));
            const data = snap.val() || {};
            const email = user.email.toLowerCase();
            const admins = (data.trustedEmails || "").toLowerCase().split(',').map(e => e.trim());
            const staff = (data.bioStaffEmails || "").toLowerCase().split(',').map(e => e.trim());

            userIsAdmin = email === MASTER_EMAIL || admins.includes(email);
            if (!userIsAdmin && !staff.includes(email)) { alert("Unauthorized."); auth.signOut(); return; }

            currentUser = user; 
            myKey = email.replace(/\./g, '_');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            if (userIsAdmin) {
                ['tab-directory', 'tab-config', 'tab-vote', 'tab-logs', 'tab-access', 'tab-roles'].forEach(t => document.getElementById(t).classList.remove('hidden'));
                initIconPicker(); loadDirectory(); loadLogs();
            }
            loadMyBio(); syncEverything(data);
        });

        // --- UI LOGIC ---
        window.switchTab = (id) => {
            ['profile', 'directory', 'roles', 'config', 'vote', 'access', 'logs'].forEach(p => {
                const el = document.getElementById('page-'+p);
                const tab = document.getElementById('tab-'+p);
                if(el) el.classList.toggle('hidden', p !== id);
                if(tab) tab.classList.toggle('active', p === id);
            });
        };

        window.addItem = (id, val) => {
            if(!val) return;
            const c = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'sort-item';
            div.innerHTML = `<span class="data-txt font-bold">${val}</span><span class="text-red-500 cursor-pointer" onclick="this.parentElement.remove()">×</span>`;
            c.appendChild(div);
        };

        // --- BUTTON HANDLING ---
        const btnMap = [
            { btn: 'mediaAdd', input: 'mediaInput', list: 'media-list' },
            { btn: 'voteAdd', input: 'voteInput', list: 'vote-list' },
            { btn: 'adminEmailAdd', input: 'adminEmailInput', list: 'admin-email-list' },
            { btn: 'bioEmailAdd', input: 'bioEmailInput', list: 'bio-email-list' }
        ];

        btnMap.forEach(conf => {
            document.getElementById(conf.btn).onclick = () => {
                const input = document.getElementById(conf.input);
                addItem(conf.list, input.value);
                input.value = "";
            };
        });

        // --- FIREBASE SYNC ---
        window.syncList = async (id, key) => {
            const items = Array.from(document.getElementById(id).querySelectorAll('.data-txt')).map(e => e.innerText).join(',');
            await set(ref(db, `absoluteConfigV3/${key}`), items);
            logAct(`Synced ${key}`); alert("Synced!");
            if(key === 'networkRoles') updateRoleSelector(items);
        };

        window.saveBranding = () => {
            update(ref(db, 'absoluteConfigV3'), {
                bgImageUrl: document.getElementById('bgImageUrl').value, logoUrl: document.getElementById('logoUrl').value,
                navBg: document.getElementById('navBg').value, navLogoCol: document.getElementById('navLogoCol').value,
                heroTitleCol: document.getElementById('heroTitleCol').value, heroBtnBg: document.getElementById('heroBtnBg').value
            }).then(() => { logAct("Visuals Saved"); alert("Updated!"); });
        };

        window.saveHeroInfo = () => {
            update(ref(db, 'absoluteConfigV3'), { heroTitle: document.getElementById('heroTitle').value, serverIp: document.getElementById('serverIp').value }).then(() => { logAct("Hero Saved"); alert("Updated!"); });
        };

        window.savePartnerSocial = () => {
            update(ref(db, 'absoluteConfigV3'), {
                sponsorName: document.getElementById('sponsorName').value, sponsorUrl: document.getElementById('sponsorUrl').value,
                promoCode: document.getElementById('promoCode').value, discordLink: document.getElementById('discordLink').value,
                patreonBtnLink: document.getElementById('patreonBtnLink').value
            }).then(() => { logAct("Socials Saved"); alert("Updated!"); });
        };

        // --- ROLES & ICONS ---
        function initIconPicker() {
            const picker = document.getElementById('icon-picker');
            picker.innerHTML = "";
            lucideIcons.forEach(icon => {
                const box = document.createElement('div');
                box.className = 'icon-box';
                box.innerHTML = `<i data-lucide="${icon}"></i>`;
                box.onclick = () => {
                    document.querySelectorAll('.icon-box').forEach(el => el.classList.remove('selected'));
                    box.classList.add('selected'); selIcon = icon; updatePreview();
                };
                picker.appendChild(box);
            });
            lucide.createIcons();
        }

        window.updatePreview = () => {
            const pill = document.getElementById('role-preview-pill');
            const icon = document.getElementById('preview-icon-el');
            const text = document.getElementById('preview-text-el');
            selColor = document.getElementById('roleColorInput').value;
            pill.style.background = `${selColor}15`; pill.style.color = selColor; pill.style.borderColor = selColor;
            text.innerText = document.getElementById('roleTitleInput').value || "New Role";
            icon.setAttribute('data-lucide', selIcon); lucide.createIcons();
        };

        document.getElementById('roleAddBtn').onclick = () => {
            const title = document.getElementById('roleTitleInput').value;
            if(!title) return;
            addItem('role-list', `${title}|${selIcon}|${selColor}`);
            document.getElementById('roleTitleInput').value = "";
        };

        function updateRoleSelector(rolesStr) {
            const s = document.getElementById('myStaffRoleDropdown');
            s.innerHTML = '<option value="">Select Role...</option>';
            if(!rolesStr) return;
            rolesStr.split(',').forEach(r => {
                const [n] = r.split('|'); const o = document.createElement('option');
                o.value = n; o.innerText = n; s.appendChild(o);
            });
        }

        // --- STAFF OVERRIDE SYSTEM ---
        window.loadMyBio = async () => {
            const snap = await get(ref(db, `absoluteConfigV3/staffProfiles/${myKey}`));
            if(snap.exists()) {
                const d = snap.val();
                document.getElementById('myStaffName').value = d.name || "";
                document.getElementById('myStaffBio').value = d.bio || "";
                document.getElementById('myStaffRoleDropdown').value = d.role || "";
            }
        };

        window.editStaffMember = async (key) => {
            if (currentUser.email.toLowerCase() !== MASTER_EMAIL) return;
            const snap = await get(ref(db, `absoluteConfigV3/staffProfiles/${key}`));
            if (snap.exists()) {
                targetOverrideKey = key;
                const d = snap.val();
                document.getElementById('myStaffName').value = d.name || "";
                document.getElementById('myStaffBio').value = d.bio || "";
                document.getElementById('myStaffRoleDropdown').value = d.role || "";
                document.getElementById('edit-hud').classList.remove('hidden');
                document.getElementById('profile-title-text').innerText = "STAFF OVERRIDE: " + (d.email || "Unknown");
                document.getElementById('save-profile-btn').innerText = "SAVE STAFF OVERRIDE";
                switchTab('profile');
            }
        };

        window.cancelOverride = () => {
            targetOverrideKey = null;
            document.getElementById('edit-hud').classList.add('hidden');
            document.getElementById('profile-title-text').innerText = "Personal Bio Editor";
            document.getElementById('save-profile-btn').innerText = "Save My Profile";
            loadMyBio();
        };

        window.saveCurrentProfile = async () => {
            const finalKey = targetOverrideKey ? targetOverrideKey : myKey;
            const p = { 
                name: document.getElementById('myStaffName').value, 
                role: document.getElementById('myStaffRoleDropdown').value, 
                bio: document.getElementById('myStaffBio').value, 
                lastUpdate: new Date().toISOString() 
            };
            const snap = await get(ref(db, `absoluteConfigV3/staffProfiles/${finalKey}`));
            if(snap.exists()) p.email = snap.val().email;
            else if(!targetOverrideKey) p.email = currentUser.email;

            await update(ref(db, `absoluteConfigV3/staffProfiles/${finalKey}`), p);
            logAct(targetOverrideKey ? `Overrode profile ${finalKey}` : "Updated own profile");
            alert("Success!");
            if(targetOverrideKey) cancelOverride();
        };

        // --- DIRECTORY & LOGS ---
        function loadDirectory() {
            onValue(ref(db, 'absoluteConfigV3/staffProfiles'), (s) => {
                const c = document.getElementById('directory-container');
                c.innerHTML = "";
                if(s.val()) Object.entries(s.val()).forEach(([k, p]) => {
                    const isMaster = currentUser.email.toLowerCase() === MASTER_EMAIL;
                    c.innerHTML += `
                        <div class="section-card directory-card !p-6 flex flex-col justify-between">
                            <div>
                                <h4 class="text-orange-500 font-black uppercase text-sm">${p.name || 'Staff'}</h4>
                                <p class="text-[10px] text-zinc-500 font-bold uppercase mt-1">${p.role || 'Member'}</p>
                                <p class="text-[9px] text-zinc-700 mt-4 break-all">${p.email || 'No Email'}</p>
                            </div>
                            ${isMaster ? `<button onclick="editStaffMember('${k}')" class="mt-4 bg-zinc-800 text-orange-500 text-[10px] font-bold py-2 rounded border border-orange-500/20 hover:bg-orange-600 hover:text-white transition">EDIT DATA</button>` : ''}
                        </div>`;
                });
            });
        }

        function logAct(act) { push(ref(db, 'absoluteConfigV3/logs'), { user: currentUser.email, action: act, time: new Date().toISOString() }); }

        function loadLogs() {
            onValue(query(ref(db, 'absoluteConfigV3/logs'), limitToLast(30)), (s) => {
                const c = document.getElementById('log-container');
                c.innerHTML = "";
                if(s.val()) Object.values(s.val()).reverse().forEach(l => {
                    c.innerHTML += `<div class="mb-1"><span class="text-orange-900 font-bold">[${new Date(l.time).toLocaleTimeString()}]</span> ${l.user}: ${l.action}</div>`;
                });
            });
        }

        function syncEverything(data) {
            if(!data) return;
            const fields = ['bgImageUrl', 'logoUrl', 'navBg', 'navLogoCol', 'heroTitleCol', 'heroBtnBg', 'heroTitle', 'serverIp', 'sponsorName', 'sponsorUrl', 'promoCode', 'discordLink', 'patreonBtnLink'];
            fields.forEach(f => { if(data[f]) document.getElementById(f).value = data[f]; });
            const lists = {'media-list': data.mediaUrls, 'vote-list': data.voteLinks, 'admin-email-list': data.trustedEmails, 'bio-email-list': data.bioStaffEmails, 'role-list': data.networkRoles};
            Object.entries(lists).forEach(([id, val]) => { const c = document.getElementById(id); if(val && c) { c.innerHTML = ""; val.split(',').forEach(i => addItem(id, i.trim())); }});
            updateRoleSelector(data.networkRoles);
        }

        ['media-list', 'vote-list', 'admin-email-list', 'bio-email-list', 'role-list'].forEach(id => {
            const el = document.getElementById(id);
            if(el) new Sortable(el, { animation: 150 });
        });
    </script>
</body>
</html>
