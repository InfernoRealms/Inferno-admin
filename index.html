<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inferno Dashboard | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            padding: 20px;
        }

        /* Restoration of the Screenshot UI */
        .dashboard-header {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            color: #ea580c;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .section-card {
            background: #111111;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #1f1f1f;
            height: 100%;
        }

        .section-title {
            color: #ea580c;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        label {
            font-size: 10px;
            font-weight: 800;
            color: #444;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
            margin-top: 12px;
        }

        input[type="text"], textarea, select {
            background: #000000 !important;
            border: 1px solid #1f1f1f;
            padding: 12px;
            border-radius: 6px;
            color: #eee !important;
            width: 100%;
            font-size: 13px;
            outline: none;
        }

        input:focus { border-color: #ea580c; }

        .btn-orange {
            background: #ea580c;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 11px;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .btn-orange:hover { background: #f97316; }

        .btn-outline-save {
            background: #1a1a1a;
            color: #ea580c;
            border: 1px solid #ea580c44;
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 11px;
            margin-top: 15px;
            cursor: pointer;
        }

        .nav-tab {
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-tab.active {
            background: #ea580c;
            color: white;
        }

        .sort-item {
            background: #000;
            border: 1px solid #1f1f1f;
            margin-bottom: 5px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .icon-grid {
            display: grid;
            grid-template-cols: repeat(auto-fill, minmax(40px, 1fr));
            gap: 5px;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-10 rounded-3xl border border-zinc-800 text-center">
            <h2 class="dashboard-header mb-8">Inferno</h2>
            <button id="loginBtn" class="btn-orange w-full py-4 text-sm">Sign in with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="flex flex-wrap justify-between items-center mb-8">
            <div class="dashboard-header">Inferno Dashboard</div>
            <div class="flex gap-2 bg-[#111] p-1.5 rounded-xl border border-zinc-800">
                <button onclick="switchTab('profile')" id="tab-profile" class="nav-tab">My Profile</button>
                <button onclick="switchTab('directory')" id="tab-directory" class="nav-tab hidden">Directory</button>
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab hidden">Config</button>
                <button onclick="switchTab('vote')" id="tab-vote" class="nav-tab hidden">Voting</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab hidden">Activity</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab hidden">Emails</button>
            </div>
        </div>

        <div id="page-config" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                <div class="section-card">
                    <div class="section-title">Visual Branding</div>
                    <label>Background Image</label>
                    <input type="text" id="bgImageUrl">
                    <label>Logo Icon</label>
                    <input type="text" id="logoUrl">
                    <div class="grid grid-cols-4 gap-2 mt-4">
                        <div><label>Nav BG</label><input type="color" id="navBg" class="h-10 w-full bg-black border border-zinc-800"></div>
                        <div><label>Logo Col</label><input type="color" id="navLogoCol" class="h-10 w-full bg-black border border-zinc-800"></div>
                        <div><label>Hero Text</label><input type="color" id="heroTitleCol" class="h-10 w-full bg-black border border-zinc-800"></div>
                        <div><label>Accent</label><input type="color" id="heroBtnBg" class="h-10 w-full bg-black border border-zinc-800"></div>
                    </div>
                    <button onclick="saveBranding()" class="btn-outline-save">Save Visuals</button>
                </div>

                <div class="section-card">
                    <div class="section-title">Hero & Media</div>
                    <label>Hero Title</label>
                    <input type="text" id="heroTitle">
                    <label>Server IP</label>
                    <input type="text" id="serverIp">
                    <button onclick="saveHeroInfo()" class="btn-outline-save !mt-4">Save Hero Info</button>
                    
                    <label class="mt-6">Media Carousel</label>
                    <div class="flex gap-2">
                        <input type="text" id="mediaInput" placeholder="URL...">
                        <button id="mediaAdd" class="btn-orange">+</button>
                    </div>
                    <div id="media-list" class="sort-list mt-3"></div>
                    <button onclick="syncList('media-list', 'mediaUrls')" class="btn-outline-save">Save Media Order</button>
                </div>

            </div>

            <div class="section-card">
                <div class="section-title">Partner & Social</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                    <div><label>Sponsor Name</label><input type="text" id="sponsorName"></div>
                    <div><label>Sponsor URL</label><input type="text" id="sponsorUrl"></div>
                    <div><label>Promo Code</label><input type="text" id="promoCode"></div>
                    <div><label>Discord Link</label><input type="text" id="discordLink"></div>
                </div>
                <label>Patreon Link</label>
                <input type="text" id="patreonBtnLink">
                <button onclick="savePartnerSocial()" class="btn-outline-save">Save Socials</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-card">
                    <div class="section-title">SMP List</div>
                    <div class="flex gap-2"><input type="text" id="smpInput"><button id="smpAdd" class="btn-orange">+</button></div>
                    <div id="smp-list" class="sort-list mt-3"></div>
                    <button onclick="syncList('smp-list', 'smpList')" class="btn-outline-save">Save SMPs</button>
                </div>
                <div class="section-card">
                    <div class="section-title">Events List</div>
                    <div class="flex gap-2"><input type="text" id="eventInput"><button id="eventAdd" class="btn-orange">+</button></div>
                    <div id="event-list" class="sort-list mt-3"></div>
                    <button onclick="syncList('event-list', 'eventList')" class="btn-outline-save">Save Events</button>
                </div>
            </div>
        </div>

        <div id="page-access" class="hidden max-w-4xl mx-auto">
            <div class="section-card">
                <div class="section-title">Staff Access (Profile Only)</div>
                <div class="flex gap-2">
                    <input type="text" id="bioEmailInput" placeholder="staff@gmail.com">
                    <button id="bioEmailAdd" class="btn-orange text-lg">+</button>
                </div>
                <div id="bio-email-list" class="sort-list mt-4 bg-black p-4 rounded-lg min-h-[100px]"></div>
                <button onclick="syncList('bio-email-list', 'bioStaffEmails')" class="btn-outline-save">Save Staff Access</button>
            </div>

            <div class="section-card mt-6">
                <div class="section-title">Admin Whitelist (Full Control)</div>
                <div class="flex gap-2">
                    <input type="text" id="adminEmailInput" placeholder="admin@gmail.com">
                    <button id="adminEmailAdd" class="btn-orange">+</button>
                </div>
                <div id="admin-email-list" class="sort-list mt-4"></div>
                <button onclick="syncList('admin-email-list', 'trustedEmails')" class="btn-outline-save">Save Admin Whitelist</button>
            </div>
        </div>

        <div id="page-profile" class="hidden max-w-2xl mx-auto">
            <div class="section-card">
                <div class="section-title">My Profile</div>
                <input type="hidden" id="editingStaffKey">
                <label>Display Name</label><input type="text" id="myStaffName">
                <label>Role</label><select id="myStaffRoleDropdown"></select>
                <label>Bio</label><textarea id="myStaffBio" rows="6"></textarea>
                <button onclick="saveCurrentProfile()" class="btn-orange w-full mt-4">Save Profile</button>
            </div>
        </div>

        <div id="page-vote" class="hidden max-w-2xl mx-auto">
            <div class="section-card">
                <div class="section-title">Voting Links</div>
                <div class="flex gap-2"><input type="text" id="voteInput" placeholder="Name|URL"><button id="voteAdd" class="btn-orange">+</button></div>
                <div id="vote-list" class="sort-list mt-4"></div>
                <button onclick="syncList('vote-list', 'voteLinks')" class="btn-outline-save">Save Voting Links</button>
            </div>
        </div>

        <div id="page-directory" class="hidden"><div id="directory-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
        <div id="page-logs" class="hidden"><div id="log-container" class="bg-black p-4 rounded-xl border border-zinc-800 h-[500px] overflow-y-auto font-mono text-xs"></div></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc", 
            authDomain: "inferno-realms.firebaseapp.com", 
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/", 
            projectId: "inferno-realms", 
            appId: "1:669014530995:web:41fd088f6255118c9e89c6" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let currentUser = null, userIsAdmin = false, myKey = "";

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            const snap = await get(ref(db, 'absoluteConfigV3'));
            const d = snap.val() || {};
            const admins = (d.trustedEmails || "").toLowerCase().split(',').map(e => e.trim());
            const bios = (d.bioStaffEmails || "").toLowerCase().split(',').map(e => e.trim());
            const email = user.email.toLowerCase();

            userIsAdmin = email === "abeedwehbe@gmail.com" || admins.includes(email);
            if (!userIsAdmin && !bios.includes(email)) { alert("Access Denied."); auth.signOut(); return; }

            currentUser = user; myKey = email.replace(/\./g, '_');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            if (userIsAdmin) {
                ['tab-directory', 'tab-config', 'tab-vote', 'tab-logs', 'tab-access'].forEach(i => document.getElementById(i).classList.remove('hidden'));
                loadDirectory(); loadLogs();
            }
            loadMyBio(); syncEverything(d);
        });

        // RESTORED FUNCTIONS
        window.saveBranding = () => update(ref(db, 'absoluteConfigV3'), { 
            bgImageUrl: document.getElementById('bgImageUrl').value, 
            logoUrl: document.getElementById('logoUrl').value, 
            navBg: document.getElementById('navBg').value,
            navLogoCol: document.getElementById('navLogoCol').value,
            heroTitleCol: document.getElementById('heroTitleCol').value,
            heroBtnBg: document.getElementById('heroBtnBg').value 
        }).then(() => alert("Visuals Saved!"));

        window.saveHeroInfo = () => update(ref(db, 'absoluteConfigV3'), { 
            heroTitle: document.getElementById('heroTitle').value, 
            serverIp: document.getElementById('serverIp').value 
        }).then(() => alert("Hero Info Saved!"));

        window.savePartnerSocial = () => update(ref(db, 'absoluteConfigV3'), { 
            sponsorName: document.getElementById('sponsorName').value, 
            sponsorUrl: document.getElementById('sponsorUrl').value, 
            promoCode: document.getElementById('promoCode').value, 
            discordLink: document.getElementById('discordLink').value, 
            patreonBtnLink: document.getElementById('patreonBtnLink').value 
        }).then(() => alert("Socials Saved!"));

        window.syncList = async (id, key) => {
            const items = Array.from(document.getElementById(id).querySelectorAll('.sort-item')).map(i => i.querySelector('.data-txt').innerText).join(',');
            await set(ref(db, `absoluteConfigV3/${key}`), items); 
            alert("Updated!");
        };

        window.addItem = (id, val) => {
            if(!val) return; const d = document.createElement('div'); d.className='sort-item';
            d.innerHTML = `<span class="data-txt">${val}</span><button class="text-red-500 font-bold" onclick="this.parentElement.remove()">×</button>`;
            document.getElementById(id).appendChild(d);
        };

        window.loadMyBio = async () => {
            const s = await get(ref(db, `absoluteConfigV3/staffProfiles/${myKey}`));
            if(s.exists()) {
                const d = s.val();
                document.getElementById('myStaffName').value = d.name || "";
                document.getElementById('myStaffBio').value = d.bio || "";
            }
        };

        async function syncEverything(d) {
            const lists = {'smp-list':'smpList', 'event-list':'eventList', 'media-list':'mediaUrls', 'vote-list':'voteLinks', 'admin-email-list':'trustedEmails', 'bio-email-list':'bioStaffEmails'};
            Object.entries(lists).forEach(([id, k]) => { if(d[k]) { document.getElementById(id).innerHTML=""; d[k].split(',').forEach(v => addItem(id, v.trim())); } });
            const fields = ['bgImageUrl', 'logoUrl', 'navBg', 'navLogoCol', 'heroTitleCol', 'heroBtnBg', 'heroTitle', 'serverIp', 'sponsorName', 'sponsorUrl', 'promoCode', 'discordLink', 'patreonBtnLink'];
            fields.forEach(f => { if(d[f]) document.getElementById(f).value = d[f]; });
        }

        window.switchTab = (id) => {
            ['profile', 'directory', 'config', 'vote', 'access', 'logs'].forEach(t => {
                if(document.getElementById('page-'+t)) document.getElementById('page-'+t).classList.toggle('hidden', t !== id);
                if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.toggle('active', t === id);
            });
        };

        ['media', 'smp', 'event', 'vote', 'adminEmail', 'bioEmail'].forEach(x => {
            document.getElementById(x+'Add').onclick = () => { 
                const i = document.getElementById(x+'Input'); addItem(x==='adminEmail'?'admin-email-list':x==='bioEmail'?'bio-email-list':x+'-list', i.value); i.value=''; 
            };
        });

        ['smp-list', 'event-list', 'media-list', 'vote-list', 'admin-email-list', 'bio-email-list'].forEach(id => { 
            new Sortable(document.getElementById(id), { animation: 150 }); 
        });
    </script>
</body>
</html>
