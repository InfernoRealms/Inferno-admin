<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inferno Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; padding: 40px; }
        .box { background: #111; padding: 24px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; }
        input, textarea { background: #000; border: 1px solid #333; padding: 10px; color: white; width: 100%; margin-bottom: 10px; }
        .hidden { display: none; }
        .tab-btn { padding: 10px 20px; background: #222; margin-right: 10px; cursor: pointer; }
        .active { background: #ea580c; }
    </script>
</head>
<body>
    <div id="login" class="text-center pt-20">
        <button id="loginBtn" class="bg-orange-600 px-10 py-4 font-bold uppercase">Login</button>
    </div>

    <div id="main" class="hidden">
        <div class="flex mb-10">
            <button onclick="tab('bio')" id="t-bio" class="tab-btn active">My Bio</button>
            <button onclick="tab('site')" id="t-site" class="tab-btn hidden">Site Config</button>
        </div>

        <div id="p-bio">
            <div class="box">
                <h2 class="font-bold text-orange-500 mb-4">EDIT MY STAFF PROFILE</h2>
                <input type="text" id="my-name" placeholder="Name">
                <input type="text" id="my-role" placeholder="Role">
                <textarea id="my-bio" rows="4" placeholder="Bio"></textarea>
                <button onclick="saveBio()" class="w-full bg-orange-600 py-3 font-bold">SAVE PROFILE</button>
            </div>
        </div>

        <div id="p-site" class="hidden">
            <div class="box">
                <h2 class="font-bold text-orange-500 mb-4">GLOBAL CONFIG</h2>
                <input type="text" id="c-hero" placeholder="Hero Title">
                <input type="text" id="c-ip" placeholder="Server IP">
                <button onclick="saveSite()" class="w-full bg-orange-600 py-3 font-bold">SAVE SITE</button>
            </div>
            <div class="box">
                <h2 class="font-bold text-orange-500 mb-4">BIO ACCESS (STAFF EMAILS)</h2>
                <p class="text-xs mb-2">Comma separated emails allowed to edit bios only</p>
                <input type="text" id="c-staff-emails">
                <button onclick="saveEmails()" class="w-full bg-orange-600 py-3 font-bold">SAVE EMAILS</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
            authDomain: "inferno-realms.firebaseapp.com",
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
            projectId: "inferno-realms",
            appId: "1:669014530995:web:41fd088f6255118c9e89c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let sEmail = "";

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'absoluteConfigV3'));
                const d = snap.val() || {};
                const isAdmin = user.email === "abeedwehbe@gmail.com" || (d.trustedEmails || "").includes(user.email);
                const isStaff = (d.bioStaffEmails || "").includes(user.email);

                if (isAdmin || isStaff) {
                    sEmail = user.email.replace(/\./g, '_');
                    document.getElementById('login').classList.add('hidden');
                    document.getElementById('main').classList.remove('hidden');
                    if (isAdmin) document.getElementById('t-site').classList.remove('hidden');
                    
                    // Pre-fill
                    const p = d.staffProfiles?.[sEmail] || {};
                    document.getElementById('my-name').value = p.name || "";
                    document.getElementById('my-role').value = p.role || "";
                    document.getElementById('my-bio').value = p.bio || "";
                    document.getElementById('c-hero').value = d.heroTitle || "";
                    document.getElementById('c-ip').value = d.serverIp || "";
                    document.getElementById('c-staff-emails').value = d.bioStaffEmails || "";
                }
            }
        });

        window.tab = (t) => {
            document.getElementById('p-bio').classList.toggle('hidden', t !== 'bio');
            document.getElementById('p-site').classList.toggle('hidden', t !== 'site');
        };

        window.saveBio = () => {
            const data = { name: document.getElementById('my-name').value, role: document.getElementById('my-role').value, bio: document.getElementById('my-bio').value };
            update(ref(db, `absoluteConfigV3/staffProfiles/${sEmail}`), data).then(() => alert("Saved!"));
        };

        window.saveSite = () => {
            update(ref(db, 'absoluteConfigV3'), { heroTitle: document.getElementById('c-hero').value, serverIp: document.getElementById('c-ip').value }).then(() => alert("Saved!"));
        };

        window.saveEmails = () => {
            update(ref(db, 'absoluteConfigV3'), { bioStaffEmails: document.getElementById('c-staff-emails').value }).then(() => alert("Saved!"));
        };
    </script>
</body>
</html>
