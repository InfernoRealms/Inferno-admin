<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inferno Admin | Staff Profiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 40px; }
        .section-box { background: #111; padding: 24px; border-radius: 20px; border: 1px solid #222; margin-bottom: 24px; position: relative; }
        .section-title { font-size: 14px; font-weight: 900; color: #ea580c; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; margin-top: 15px; }
        input[type="text"], textarea { background: #000 !important; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white !important; width: 100%; font-size: 13px; outline: none; }
        input[type="color"] { -webkit-appearance: none; border: 2px solid #333; width: 100%; height: 40px; cursor: pointer; background: #000; border-radius: 8px; padding: 2px; }
        .nav-tab { cursor: pointer; padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 12px; transition: 0.3s; color: #555; }
        .nav-tab.active { background: #ea580c; color: white; }
        .sort-list { background: #080808; border-radius: 12px; padding: 10px; min-height: 80px; border: 1px solid #222; margin-top: 8px; }
        .sort-item { background: #1a1a1a; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; font-size: 11px; }
        .btn-add { background: #ea580c; color: white; padding: 0 20px; border-radius: 8px; font-weight: 900; cursor: pointer; height: 42px; }
        .btn-save { background: #222; color: #ea580c; width: 100%; padding: 10px; border-radius: 8px; font-weight: 900; font-size: 11px; text-transform: uppercase; margin-top: 20px; border: 1px solid #ea580c33; transition: 0.3s; }
        .btn-save:hover { background: #ea580c; color: white; }
        .hidden { display: none !important; }
        .log-entry { font-family: monospace; font-size: 11px; padding: 6px 0; border-bottom: 1px solid #222; }
        .log-time { color: #ea580c; opacity: 0.6; }
        .log-user { color: #3b82f6; font-weight: bold; margin: 0 5px; }
        .log-action { color: #22c55e; }
    </style>
</head>
<body>
    <div id="login-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-10 rounded-[30px] border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-3xl font-black italic text-orange-600 mb-6 uppercase">Inferno Auth</h2>
            <button id="loginBtn" class="w-full py-4 bg-orange-600 rounded-xl font-black uppercase">Sign in with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase tracking-tighter">Inferno Dashboard</h1>
            <div id="nav-container" class="flex flex-wrap gap-2 bg-[#111] p-1.5 rounded-xl border border-zinc-800">
                <button onclick="switchTab('profile')" id="tab-profile" class="nav-tab">MY PROFILE</button>
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab hidden">CONFIG</button>
                <button onclick="switchTab('vote')" id="tab-vote" class="nav-tab hidden">VOTING</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab hidden">ACTIVITY</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab hidden">EMAILS</button>
            </div>
        </div>

        <div id="page-profile" class="hidden max-w-2xl mx-auto">
            <div class="section-box">
                <h2 class="section-title">My Staff Profile</h2>
                <p class="text-zinc-500 text-[10px] mt-1 mb-4">Edit how you appear on the staff page.</p>
                
                <label>Display Name</label>
                <input type="text" id="myStaffName" placeholder="Minecraft Username">
                
                <label>Network Role</label>
                <input type="text" id="myStaffRole" placeholder="e.g. Senior Admin">
                
                <label>Short Bio</label>
                <textarea id="myStaffBio" rows="4" placeholder="Write a short paragraph about yourself..."></textarea>
                
                <button onclick="saveMyBio()" class="btn-save">Update Profile</button>
            </div>
        </div>

        <div id="page-config" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-box">
                    <h2 class="section-title">Visual Branding</h2>
                    <label>Background Image</label>
                    <input type="text" id="bgImageUrl" placeholder="Link...">
                    <button onclick="saveBranding()" class="btn-save">Save Visuals</button>
                </div>
                <div class="section-box">
                    <h2 class="section-title">Hero Info</h2>
                    <label>Title</label><input type="text" id="heroTitle">
                    <label>Server IP</label><input type="text" id="serverIp">
                    <button onclick="saveHeroInfo()" class="btn-save">Save Hero</button>
                </div>
            </div>
        </div>

        <div id="page-vote" class="hidden">
            </div>

        <div id="page-logs" class="hidden">
            </div>

        <div id="page-access" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-box">
                    <h2 class="section-title">Admin Whitelist</h2>
                    <p class="text-[10px] text-zinc-500">Admins have full control over all tabs.</p>
                    <div class="flex gap-2 mt-4"><input type="text" id="emailInput" placeholder="admin@gmail.com"><button id="emailAdd" class="btn-add">+</button></div>
                    <div id="email-list" class="sort-list"></div>
                    <button onclick="syncList('email-list', 'trustedEmails')" class="btn-save">Save Admin List</button>
                </div>

                <div class="section-box">
                    <h2 class="section-title">Staff Bio Whitelist</h2>
                    <p class="text-[10px] text-zinc-500">Users here can ONLY edit their own "My Profile" tab.</p>
                    <div class="flex gap-2 mt-4"><input type="text" id="bioEmailInput" placeholder="staff@gmail.com"><button id="bioEmailAdd" class="btn-add">+</button></div>
                    <div id="bio-email-list" class="sort-list"></div>
                    <button onclick="syncList('bio-email-list', 'bioStaffEmails')" class="btn-save">Save Staff List</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, limitToLast, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // [Your original firebaseConfig]
        const firebaseConfig = {
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
            authDomain: "inferno-realms.firebaseapp.com",
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
            projectId: "inferno-realms",
            appId: "1:669014530995:web:41fd088f6255118c9e89c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const ownerEmail = "abeedwehbe@gmail.com";
        let currentUser = null;
        let userPath = "";

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'absoluteConfigV3'));
                const d = snap.val() || {};
                
                const admins = (d.trustedEmails || "").split(',').filter(e => e.trim());
                const staff = (d.bioStaffEmails || "").split(',').filter(e => e.trim());
                
                const isAdmin = user.email === ownerEmail || admins.includes(user.email);
                const isStaff = staff.includes(user.email);

                if (isAdmin || isStaff) {
                    currentUser = user;
                    userPath = user.email.replace(/\./g, '_'); // Firebase key safe email
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');

                    // Set Permissions
                    if (isAdmin) {
                        ['config', 'vote', 'logs'].forEach(t => document.getElementById('tab-'+t).classList.remove('hidden'));
                        if (user.email === ownerEmail) document.getElementById('tab-access').classList.remove('hidden');
                        switchTab('config');
                    } else {
                        switchTab('profile'); // Staff only see profile
                    }
                    
                    syncEverything(); setupLogs(); loadMyBio();
                } else { alert("Access Denied."); auth.signOut(); }
            }
        });

        // LOAD INDIVIDUAL BIO
        async function loadMyBio() {
            const snap = await get(ref(db, `absoluteConfigV3/staffProfiles/${userPath}`));
            if (snap.exists()) {
                const p = snap.val();
                document.getElementById('myStaffName').value = p.name || "";
                document.getElementById('myStaffRole').value = p.role || "";
                document.getElementById('myStaffBio').value = p.bio || "";
            }
        }

        // SAVE INDIVIDUAL BIO
        window.saveMyBio = async () => {
            const data = {
                name: document.getElementById('myStaffName').value,
                role: document.getElementById('myStaffRole').value,
                bio: document.getElementById('myStaffBio').value
            };
            await update(ref(db, `absoluteConfigV3/staffProfiles/${userPath}`), data);
            logAction(`Staff Profile Updated: ${currentUser.email}`);
            alert("Profile Updated!");
        };

        // TAB SWITCHING
        window.switchTab = (id) => {
            ['profile', 'config', 'vote', 'logs', 'access'].forEach(t => {
                if(document.getElementById('page-'+t)) document.getElementById('page-'+t).classList.toggle('hidden', t !== id);
                if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.toggle('active', t === id);
            });
        };

        // SHARED LIST LOGIC
        window.syncList = async (listId, key) => {
            let items = Array.from(document.getElementById(listId).querySelectorAll('.sort-item span')).map(s => s.innerText).join(',');
            await set(ref(db, `absoluteConfigV3/${key}`), items);
            logAction(`Updated List: ${key}`);
            alert("List Saved!");
        };

        const addItem = (listId, val) => {
            if(!val) return;
            const div = document.createElement('div');
            div.className = 'sort-item';
            div.innerHTML = `<span>${val}</span><button class="text-red-500 font-bold px-2" onclick="this.parentElement.remove()">×</button>`;
            document.getElementById(listId).appendChild(div);
        };

        // BOOTSTRAP DATA
        const syncEverything = async () => {
            const snap = await get(ref(db, 'absoluteConfigV3'));
            const d = snap.val(); if (!d) return;
            
            // Whitelist lists
            const listMap = { 'email-list': 'trustedEmails', 'bio-email-list': 'bioStaffEmails' };
            Object.entries(listMap).forEach(([id, key]) => {
                document.getElementById(id).innerHTML = "";
                if(d[key]) d[key].split(',').forEach(v => v.trim() && addItem(id, v.trim()));
            });
        };

        const logAction = (action) => {
            push(ref(db, 'absoluteConfigV3/logs'), { user: currentUser.email, action: action, time: new Date().toISOString() });
        };

        // CLICK HANDLERS
        document.getElementById('emailAdd').onclick = () => { addItem('email-list', document.getElementById('emailInput').value); document.getElementById('emailInput').value = ''; };
        document.getElementById('bioEmailAdd').onclick = () => { addItem('bio-email-list', document.getElementById('bioEmailInput').value); document.getElementById('bioEmailInput').value = ''; };

        // INITIALIZE SORTABLE
        ['email-list', 'bio-email-list'].forEach(id => {
            const el = document.getElementById(id); if(el) new Sortable(el, { animation: 150 });
        });

    </script>
</body>
</html>
