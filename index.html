<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inferno Dashboard | Master Admin V21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        :root {
            --orange-primary: #ea580c;
            --bg-dark: #0a0a0a;
            --card-bg: #111111;
            --border-color: #1f1f1f;
            --input-bg: #000000;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 40px;
            margin: 0;
            line-height: 1.5;
        }

        /* Restoration of Header from Screenshot image_2be4bb */
        .dashboard-header {
            font-size: 38px;
            font-weight: 900;
            font-style: italic;
            color: var(--orange-primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(234, 88, 12, 0.2);
        }

        /* Section Cards */
        .section-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .section-title {
            color: var(--orange-primary);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after {
            content: '';
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--orange-primary), transparent);
            opacity: 0.3;
        }

        /* Form Elements */
        label {
            font-size: 11px;
            font-weight: 900;
            color: #555;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
            margin-top: 22px;
            letter-spacing: 0.5px;
        }

        input[type="text"], 
        textarea, 
        select {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            color: #ffffff !important;
            width: 100%;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--orange-primary);
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.15);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid var(--border-color);
            width: 100%;
            height: 50px;
            cursor: pointer;
            background: #000;
            border-radius: 10px;
            padding: 5px;
        }

        /* Buttons */
        .btn-orange {
            background: var(--orange-primary);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-orange:hover {
            background: #f97316;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(234, 88, 12, 0.4);
        }

        .btn-save-secondary {
            background: #1a1a1a;
            color: var(--orange-primary);
            border: 1px solid rgba(234, 88, 12, 0.3);
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-save-secondary:hover {
            background: var(--orange-primary);
            color: white;
        }

        /* Nav Tabs */
        .nav-tab {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            color: #777;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            background: transparent;
        }

        .nav-tab.active {
            background: var(--orange-primary);
            color: white;
            box-shadow: 0 8px 20px rgba(234, 88, 12, 0.3);
        }

        /* Role & Icon Picker */
        .icon-grid {
            display: grid;
            grid-template-cols: repeat(auto-fill, minmax(50px, 1fr));
            gap: 10px;
            background: #000;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            max-height: 250px;
            overflow-y: auto;
        }

        .icon-box {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            color: #444;
            transition: 0.2s;
        }

        .icon-box:hover { color: var(--orange-primary); background: #111; }
        .icon-box.selected { background: var(--orange-primary); color: white; border-color: var(--orange-primary); }

        /* Sortable Lists */
        .sort-list {
            background: #080808;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            min-height: 60px;
            border: 1px dashed #222;
        }

        .sort-item {
            background: #141414;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            padding: 14px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            transition: background 0.2s;
        }

        .sort-item:hover { background: #1a1a1a; }

        .hidden { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-14 rounded-[50px] border border-zinc-800 text-center shadow-2xl">
            <h2 class="dashboard-header mb-4">Inferno</h2>
            <p class="text-zinc-600 font-black uppercase text-[11px] tracking-[5px] mb-12">System Administrator</p>
            <button id="loginBtn" class="btn-orange w-full py-6 text-sm tracking-[3px]">Authenticate with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        
        <div class="flex flex-wrap justify-between items-center mb-12 gap-8">
            <div>
                <div class="dashboard-header">Inferno Dashboard</div>
                <p class="text-zinc-700 text-[11px] font-black uppercase tracking-[3px] mt-1">Network & Profile Control</p>
            </div>
            
            <nav id="nav-container" class="flex flex-wrap gap-2 bg-[#111] p-2 rounded-2xl border border-zinc-800 shadow-xl">
                <button onclick="switchTab('profile')" id="tab-profile" class="nav-tab active">My Profile</button>
                <button onclick="switchTab('directory')" id="tab-directory" class="nav-tab hidden">Directory</button>
                <button onclick="switchTab('roles')" id="tab-roles" class="nav-tab hidden">Roles</button>
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab hidden">Config</button>
                <button onclick="switchTab('vote')" id="tab-vote" class="nav-tab hidden">Voting</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab hidden">Activity</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab hidden">Emails</button>
            </nav>
        </div>

        <div id="page-config" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <div class="section-card">
                    <div class="section-title">Visual Branding</div>
                    <label>Background Image URL</label>
                    <input type="text" id="bgImageUrl" placeholder="https://cdn.discordapp.com/...">
                    
                    <label>Logo Icon URL</label>
                    <input type="text" id="logoUrl" placeholder="https://...">

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-4">
                        <div><label>Nav BG</label><input type="color" id="navBg"></div>
                        <div><label>Logo Col</label><input type="color" id="navLogoCol"></div>
                        <div><label>Hero Text</label><input type="color" id="heroTitleCol"></div>
                        <div><label>Accent</label><input type="color" id="heroBtnBg"></div>
                    </div>
                    <button onclick="saveBranding()" class="btn-save-secondary mt-8">Save Visual Branding</button>
                </div>

                <div class="section-card">
                    <div class="section-title">Hero & Media</div>
                    <label>Hero Title</label>
                    <input type="text" id="heroTitle" placeholder="Inferno Realms">
                    
                    <label>Server IP Address</label>
                    <input type="text" id="serverIp" placeholder="play.infernorealms.xyz">
                    
                    <button onclick="saveHeroInfo()" class="btn-save-secondary !mb-10">Save Hero Info</button>

                    <label>Media Carousel</label>
                    <div class="flex gap-4">
                        <input type="text" id="mediaInput" placeholder="URL (YT or Image)...">
                        <button id="mediaAdd" class="btn-orange text-xl">+</button>
                    </div>
                    <div id="media-list" class="sort-list"></div>
                    <button onclick="syncList('media-list', 'mediaUrls')" class="btn-save-secondary">Save Media Order</button>
                </div>

                <div class="section-card lg:col-span-2">
                    <div class="section-title">Partner & Social</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12">
                        <div>
                            <label>Sponsor Name</label><input type="text" id="sponsorName">
                            <label>Sponsor URL</label><input type="text" id="sponsorUrl">
                        </div>
                        <div>
                            <label>Promo Code</label><input type="text" id="promoCode">
                            <label>Discord Link</label><input type="text" id="discordLink">
                        </div>
                    </div>
                    <label>Patreon / Support Link</label>
                    <input type="text" id="patreonBtnLink">
                    <button onclick="savePartnerSocial()" class="btn-save-secondary">Update Partnerships</button>
                </div>

                <div class="section-card">
                    <div class="section-title">SMP List</div>
                    <div class="flex gap-3"><input type="text" id="smpInput"><button id="smpAdd" class="btn-orange">+</button></div>
                    <div id="smp-list" class="sort-list"></div>
                    <button onclick="syncList('smp-list', 'smpList')" class="btn-save-secondary">Update SMPs</button>
                </div>
                <div class="section-card">
                    <div class="section-title">Event Schedule</div>
                    <div class="flex gap-3"><input type="text" id="eventInput"><button id="eventAdd" class="btn-orange">+</button></div>
                    <div id="event-list" class="sort-list"></div>
                    <button onclick="syncList('event-list', 'eventList')" class="btn-save-secondary">Update Events</button>
                </div>
            </div>
        </div>

        <div id="page-roles" class="hidden">
            <div class="section-card max-w-5xl mx-auto">
                <div class="section-title">Role Configuration & Icons</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <label>New Role Name</label>
                        <input type="text" id="roleTitleInput" placeholder="e.g. Lead Admin">
                        
                        <label>Selected Icon: <span id="sel-icon-name" class="text-orange-500 ml-2">None</span></label>
                        <div class="p-6 bg-black rounded-xl border border-zinc-800 flex justify-center items-center h-32">
                            <div id="preview-icon-box" class="text-orange-500 scale-[2.5]"></div>
                        </div>
                        <button id="roleAddBtn" class="btn-orange w-full mt-8">Register Role</button>
                    </div>
                    <div>
                        <label>Icon Library (Lucide)</label>
                        <div class="icon-grid" id="icon-picker">
                            </div>
                    </div>
                </div>
                <div id="role-list" class="sort-list mt-10"></div>
                <button onclick="syncList('role-list', 'networkRoles')" class="btn-save-secondary">Save Global Roles</button>
            </div>
        </div>

        <div id="page-profile" class="hidden">
            <div class="max-w-3xl mx-auto section-card">
                <div class="section-title">Personal Bio Editor</div>
                <input type="hidden" id="editingStaffKey">
                
                <label>Public Display Name</label>
                <input type="text" id="myStaffName" placeholder="Your Name">
                
                <label>Assign Your Role</label>
                <select id="myStaffRoleDropdown">
                    <option value="">Choose a role...</option>
                </select>
                
                <label>Biography / About Me</label>
                <textarea id="myStaffBio" rows="10" placeholder="Tell the network about yourself..."></textarea>
                
                <button onclick="saveCurrentProfile()" class="btn-orange w-full mt-10 py-5 text-md">Save My Profile Info</button>
            </div>
        </div>

        <div id="page-access" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-6xl mx-auto">
                <div class="section-card">
                    <div class="section-title">Staff Access (Self-Edit Only)</div>
                    <div class="flex gap-2"><input type="text" id="bioEmailInput"><button id="bioEmailAdd" class="btn-orange">+</button></div>
                    <div id="bio-email-list" class="sort-list"></div>
                    <button onclick="syncList('bio-email-list', 'bioStaffEmails')" class="btn-save-secondary">Update Staff Access</button>
                </div>
                <div class="section-card">
                    <div class="section-title">Super-Admin Whitelist</div>
                    <div class="flex gap-2"><input type="text" id="adminEmailInput"><button id="adminEmailAdd" class="btn-orange">+</button></div>
                    <div id="admin-email-list" class="sort-list"></div>
                    <button onclick="syncList('admin-email-list', 'trustedEmails')" class="btn-save-secondary">Update Admin Rights</button>
                </div>
            </div>
        </div>

        <div id="page-vote" class="hidden">
            <div class="max-w-3xl mx-auto section-card">
                <div class="section-title">Network Voting Links</div>
                <div class="flex gap-3"><input type="text" id="voteInput" placeholder="Name|Link"><button id="voteAdd" class="btn-orange">Add</button></div>
                <div id="vote-list" class="sort-list mt-8"></div>
                <button onclick="syncList('vote-list', 'voteLinks')" class="btn-save-secondary">Sync Voting Directory</button>
            </div>
        </div>

        <div id="page-directory" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-8" id="directory-container"></div>
        </div>
        <div id="page-logs" class="hidden">
            <div class="section-card"><div class="section-title">Audit Log</div><div id="log-container" class="bg-black p-8 rounded-2xl h-[600px] overflow-y-auto font-mono text-[11px] text-zinc-400"></div></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc", 
            authDomain: "inferno-realms.firebaseapp.com", 
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/", 
            projectId: "inferno-realms", 
            appId: "1:669014530995:web:41fd088f6255118c9e89c6" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let currentUser = null, userIsAdmin = false, myKey = "", selIcon = "";

        const lucideIcons = ['crown', 'shield', 'gavel', 'star', 'swords', 'zap', 'flame', 'skull', 'gem', 'wrench', 'hammer', 'shield-check', 'user-cog', 'bot', 'terminal', 'code', 'palette', 'camera', 'mic', 'globe', 'link', 'heart', 'eye', 'lock', 'settings', 'alert-triangle', 'check-circle', 'info', 'help-circle'];

        // LOGIN
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        // AUTH & PERMISSIONS
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                return;
            }

            const snap = await get(ref(db, 'absoluteConfigV3'));
            const data = snap.val() || {};
            const email = user.email.toLowerCase();
            const admins = (data.trustedEmails || "").toLowerCase().split(',').map(e => e.trim());
            const staff = (data.bioStaffEmails || "").toLowerCase().split(',').map(e => e.trim());

            userIsAdmin = email === "abeedwehbe@gmail.com" || admins.includes(email);
            if (!userIsAdmin && !staff.includes(email)) {
                alert("Restricted Access.");
                auth.signOut();
                return;
            }

            currentUser = user;
            myKey = email.replace(/\./g, '_');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            if (userIsAdmin) {
                ['tab-directory', 'tab-config', 'tab-vote', 'tab-logs', 'tab-access', 'tab-roles'].forEach(t => document.getElementById(t).classList.remove('hidden'));
                initIconPicker();
                loadDirectory();
                loadLogs();
            }
            
            loadMyBio();
            syncEverything(data);
        });

        // SYNC ENGINE (Detailed restoration of all screenshot fields)
        function syncEverything(data) {
            if(!data) return;

            // Simple Inputs
            const inputMap = {
                'bgImageUrl': data.bgImageUrl, 'logoUrl': data.logoUrl,
                'navBg': data.navBg, 'navLogoCol': data.navLogoCol,
                'heroTitleCol': data.heroTitleCol, 'heroBtnBg': data.heroBtnBg,
                'heroTitle': data.heroTitle, 'serverIp': data.serverIp,
                'sponsorName': data.sponsorName, 'sponsorUrl': data.sponsorUrl,
                'promoCode': data.promoCode, 'discordLink': data.discordLink,
                'patreonBtnLink': data.patreonBtnLink
            };
            Object.entries(inputMap).forEach(([id, val]) => {
                if(val && document.getElementById(id)) document.getElementById(id).value = val;
            });

            // Re-orderable Lists
            const listMap = {
                'media-list': data.mediaUrls, 'smp-list': data.smpList,
                'event-list': data.eventList, 'vote-list': data.voteLinks,
                'admin-email-list': data.trustedEmails, 'bio-email-list': data.bioStaffEmails,
                'role-list': data.networkRoles
            };
            Object.entries(listMap).forEach(([id, val]) => {
                const container = document.getElementById(id);
                if(val && container) {
                    container.innerHTML = "";
                    val.split(',').forEach(item => addItem(id, item.trim()));
                }
            });

            // Update Profile Role Select
            updateRoleSelector(data.networkRoles);
        }

        // ROLE MANAGEMENT
        function initIconPicker() {
            const picker = document.getElementById('icon-picker');
            picker.innerHTML = "";
            lucideIcons.forEach(icon => {
                const box = document.createElement('div');
                box.className = 'icon-box';
                box.innerHTML = `<i data-lucide="${icon}"></i>`;
                box.onclick = () => {
                    document.querySelectorAll('.icon-box').forEach(el => el.classList.remove('selected'));
                    box.classList.add('selected');
                    selIcon = icon;
                    document.getElementById('sel-icon-name').innerText = icon;
                    const preview = document.getElementById('preview-icon-box');
                    preview.innerHTML = `<i data-lucide="${icon}"></i>`;
                    lucide.createIcons();
                };
                picker.appendChild(box);
            });
            lucide.createIcons();
        }

        document.getElementById('roleAddBtn').onclick = () => {
            const title = document.getElementById('roleTitleInput').value;
            if(!title || !selIcon) return alert("Missing role name or icon!");
            addItem('role-list', `${title}|${selIcon}`);
            document.getElementById('roleTitleInput').value = "";
        };

        function updateRoleSelector(rolesStr) {
            const select = document.getElementById('myStaffRoleDropdown');
            select.innerHTML = '<option value="">Select your network role...</option>';
            if(!rolesStr) return;
            rolesStr.split(',').forEach(r => {
                const [name] = r.split('|');
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
        }

        // SAVE & SYNC
        window.saveBranding = () => {
            update(ref(db, 'absoluteConfigV3'), {
                bgImageUrl: document.getElementById('bgImageUrl').value,
                logoUrl: document.getElementById('logoUrl').value,
                navBg: document.getElementById('navBg').value,
                navLogoCol: document.getElementById('navLogoCol').value,
                heroTitleCol: document.getElementById('heroTitleCol').value,
                heroBtnBg: document.getElementById('heroBtnBg').value
            }).then(() => { logAct("Updated branding"); alert("Visuals Saved!"); });
        };

        window.saveHeroInfo = () => {
            update(ref(db, 'absoluteConfigV3'), {
                heroTitle: document.getElementById('heroTitle').value,
                serverIp: document.getElementById('serverIp').value
            }).then(() => { logAct("Updated Hero/IP"); alert("Hero Info Saved!"); });
        };

        window.savePartnerSocial = () => {
            update(ref(db, 'absoluteConfigV3'), {
                sponsorName: document.getElementById('sponsorName').value,
                sponsorUrl: document.getElementById('sponsorUrl').value,
                promoCode: document.getElementById('promoCode').value,
                discordLink: document.getElementById('discordLink').value,
                patreonBtnLink: document.getElementById('patreonBtnLink').value
            }).then(() => { logAct("Updated socials"); alert("Socials Updated!"); });
        };

        window.syncList = async (id, dbKey) => {
            const items = Array.from(document.getElementById(id).querySelectorAll('.data-txt')).map(e => e.innerText).join(',');
            await set(ref(db, `absoluteConfigV3/${dbKey}`), items);
            if(dbKey === 'networkRoles') updateRoleSelector(items);
            logAct(`Updated list: ${dbKey}`);
            alert("Database Synced!");
        };

        window.addItem = (id, val) => {
            if(!val) return;
            const container = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'sort-item';
            div.innerHTML = `<span class="data-txt font-bold">${val}</span><span class="text-red-500 cursor-pointer text-xl" onclick="this.parentElement.remove()">×</span>`;
            container.appendChild(div);
        };

        // PROFILE LOGIC
        window.loadMyBio = async () => {
            const snap = await get(ref(db, `absoluteConfigV3/staffProfiles/${myKey}`));
            if(snap.exists()) {
                const d = snap.val();
                document.getElementById('myStaffName').value = d.name || "";
                document.getElementById('myStaffBio').value = d.bio || "";
                document.getElementById('myStaffRoleDropdown').value = d.role || "";
            }
        };

        window.saveCurrentProfile = async () => {
            const profile = {
                name: document.getElementById('myStaffName').value,
                role: document.getElementById('myStaffRoleDropdown').value,
                bio: document.getElementById('myStaffBio').value,
                email: currentUser.email,
                lastUpdate: new Date().toISOString()
            };
            await update(ref(db, `absoluteConfigV3/staffProfiles/${myKey}`), profile);
            logAct("Updated personal profile");
            alert("Profile Saved!");
        };

        // UI TAB SWITCHER
        window.switchTab = (id) => {
            ['profile', 'directory', 'roles', 'config', 'vote', 'access', 'logs'].forEach(p => {
                const page = document.getElementById('page-'+p);
                if(page) page.classList.toggle('hidden', p !== id);
                const tab = document.getElementById('tab-'+p);
                if(tab) tab.classList.toggle('active', p === id);
            });
        };

        // BUTTON INITIALIZERS
        ['media', 'smp', 'event', 'vote', 'adminEmail', 'bioEmail'].forEach(x => {
            document.getElementById(x+'Add').onclick = () => {
                const input = document.getElementById(x+'Input');
                addItem(x.includes('Email') ? x+'-email-list' : x+'-list', input.value);
                input.value = "";
            };
        });

        // SORTABLE INIT
        ['media-list', 'smp-list', 'event-list', 'vote-list', 'admin-email-list', 'bio-email-list', 'role-list'].forEach(id => {
            new Sortable(document.getElementById(id), { animation: 150 });
        });

        // LOGS & DIRECTORY
        function logAct(act) {
            push(ref(db, 'absoluteConfigV3/logs'), { user: currentUser.email, action: act, time: new Date().toISOString() });
        }

        function loadLogs() {
            onValue(query(ref(db, 'absoluteConfigV3/logs'), limitToLast(40)), (s) => {
                const c = document.getElementById('log-container');
                c.innerHTML = "";
                if(s.val()) Object.values(s.val()).reverse().forEach(l => {
                    c.innerHTML += `<div class="mb-2"><span class="text-orange-900">[${new Date(l.time).toLocaleTimeString()}]</span> <span class="text-zinc-500">${l.user}:</span> ${l.action}</div>`;
                });
            });
        }

        function loadDirectory() {
            onValue(ref(db, 'absoluteConfigV3/staffProfiles'), (s) => {
                const c = document.getElementById('directory-container');
                c.innerHTML = "";
                if(s.val()) Object.entries(s.val()).forEach(([key, p]) => {
                    c.innerHTML += `<div class="section-card !p-6">
                        <h4 class="text-orange-500 font-black uppercase text-sm">${p.name || 'Anonymous'}</h4>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mt-1">${p.role || 'Unassigned'}</p>
                        <p class="text-[10px] text-zinc-700 mt-4 truncate">${p.email}</p>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
