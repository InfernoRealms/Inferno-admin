<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Your Firebase Config (Keep this as is)
    const firebaseConfig = {
        apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
        authDomain: "inferno-realms.firebaseapp.com",
        databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
        projectId: "inferno-realms",
        storageBucket: "inferno-realms.firebasestorage.app",
        appId: "1:669014530995:web:41fd088f6255118c9e89c6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const configRef = ref(db, 'absoluteConfigV3');

    // --- LOAD DATA ---
    onValue(configRef, (snap) => {
        const d = snap.val();
        if (!d) return;

        // Visual Branding
        document.getElementById('bgUrlInput').value = d.bgImageUrl || "";
        document.getElementById('logoUrlInput').value = d.logoUrl || "";
        
        // Widget Settings (The Fix)
        document.getElementById('widgetActiveInput').value = d.widgetActive || "false";
        document.getElementById('widgetTextInput').value = d.widgetText || "";
        document.getElementById('widgetIconInput').value = d.widgetIconUrl || "";

        // Hero & Media
        document.getElementById('heroTitleInput').value = d.heroTitle || "";
        document.getElementById('serverIpInput').value = d.serverIp || "";
        document.getElementById('shuffleDelayInput').value = d.shuffleDelay || "15";
        document.getElementById('mediaUrlsInput').value = d.mediaUrls || "";

        // Partner & Lists
        document.getElementById('sponsorNameInput').value = d.sponsorName || "";
        document.getElementById('promoCodeInput').value = d.promoCode || "";
        document.getElementById('smpListInput').value = d.smpList || "";
        document.getElementById('eventListInput').value = d.eventList || "";
        document.getElementById('staffListInput').value = d.staffList || "";
    });

    // --- SAVE DATA ---
    window.saveConfig = () => {
        const newData = {
            bgImageUrl: document.getElementById('bgUrlInput').value,
            logoUrl: document.getElementById('logoUrlInput').value,
            
            // Widget Fix
            widgetActive: document.getElementById('widgetActiveInput').value,
            widgetText: document.getElementById('widgetTextInput').value,
            widgetIconUrl: document.getElementById('widgetIconInput').value,

            heroTitle: document.getElementById('heroTitleInput').value,
            serverIp: document.getElementById('serverIpInput').value,
            shuffleDelay: document.getElementById('shuffleDelayInput').value,
            mediaUrls: document.getElementById('mediaUrlsInput').value,
            
            sponsorName: document.getElementById('sponsorNameInput').value,
            promoCode: document.getElementById('promoCodeInput').value,
            smpList: document.getElementById('smpListInput').value,
            eventList: document.getElementById('eventListInput').value,
            staffList: document.getElementById('staffListInput').value
        };

        set(configRef, newData)
            .then(() => alert("Configuration Saved! 🔥"))
            .catch((err) => alert("Error: " + err));
    };
</script>
