<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inferno Admin | V14.0 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 40px; }
        .section-box { background: #111; padding: 24px; border-radius: 20px; border: 1px solid #222; margin-bottom: 24px; position: relative; }
        .section-title { font-size: 14px; font-weight: 900; color: #ea580c; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; margin-top: 15px; }
        input[type="text"], textarea, select { background: #000 !important; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white !important; width: 100%; font-size: 13px; outline: none; }
        input[type="color"] { -webkit-appearance: none; border: 2px solid #333; width: 100%; height: 40px; cursor: pointer; background: #000; border-radius: 8px; padding: 2px; }
        .nav-tab { cursor: pointer; padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 12px; transition: 0.3s; color: #555; }
        .nav-tab.active { background: #ea580c; color: white; }
        .sort-list { background: #080808; border-radius: 12px; padding: 10px; min-height: 80px; border: 1px solid #222; margin-top: 8px; }
        .sort-item { background: #1a1a1a; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; font-size: 11px; }
        .btn-add { background: #ea580c; color: white; padding: 0 20px; border-radius: 8px; font-weight: 900; cursor: pointer; height: 42px; }
        .btn-save { background: #222; color: #ea580c; width: 100%; padding: 10px; border-radius: 8px; font-weight: 900; font-size: 11px; text-transform: uppercase; margin-top: 20px; border: 1px solid #ea580c33; transition: 0.3s; cursor: pointer; }
        .btn-save:hover { background: #ea580c; color: white; }
        .icon-grid { display: grid; grid-template-cols: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #222; max-height: 200px; overflow-y: auto; }
        .icon-option { padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid transparent; transition: 0.2s; }
        .icon-option:hover { background: #222; border-color: #444; }
        .icon-option.selected { background: #ea580c; border-color: #ea580c; color: white; }
        .drop-zone { border: 2px dashed #333; border-radius: 12px; transition: 0.3s; background: #000; position: relative; }
        .drop-zone.dragover { border-color: #ea580c; background: #ea580c15; }
        .uploading::after { content: "UPLOADING..."; position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #ea580c; border-radius: 12px; }
        .log-entry { font-family: monospace; font-size: 11px; padding: 6px 0; border-bottom: 1px solid #222; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-10 rounded-[30px] border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-3xl font-black italic text-orange-600 mb-6 uppercase">Inferno Auth</h2>
            <button id="loginBtn" class="w-full py-4 bg-orange-600 rounded-xl font-black uppercase">Sign in with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="flex flex-wrap justify-between items-center mb-10 gap-4">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase tracking-tighter">Inferno Dashboard</h1>
            <div id="nav-container" class="flex gap-2 bg-[#111] p-1.5 rounded-xl border border-zinc-800">
                <button onclick="switchTab('profile')" id="tab-profile" class="nav-tab">MY PROFILE</button>
                <button onclick="switchTab('directory')" id="tab-directory" class="nav-tab hidden">DIRECTORY</button>
                <button onclick="switchTab('roles')" id="tab-roles" class="nav-tab hidden">ROLES</button>
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab hidden">CONFIG</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab hidden">ACCESS</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab hidden">LOGS</button>
            </div>
        </div>

        <div id="page-profile" class="max-w-2xl mx-auto">
            <div class="section-box">
                <h2 id="editor-title" class="section-title">Profile Editor</h2>
                <input type="hidden" id="editingStaffKey">
                <label>Display Name</label><input type="text" id="myStaffName">
                <label>Network Role</label><select id="myStaffRoleDropdown"><option value="">Loading...</option></select>
                <label>About Me (Bio)</label><textarea id="myStaffBio" rows="6"></textarea>
                <button onclick="saveCurrentProfile()" class="btn-save">Save Profile</button>
                <button id="cancelMod" onclick="loadMyBio()" class="hidden w-full text-[10px] mt-4 font-bold text-zinc-500 uppercase">Back to My Profile</button>
            </div>
        </div>

        <div id="page-directory" class="hidden">
            <div class="section-box">
                <h2 class="section-title">Staff Management</h2>
                <div id="directory-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6"></div>
            </div>
        </div>

        <div id="page-roles" class="hidden">
            <div class="section-box">
                <h2 class="section-title">Icon & Role Manager</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                    <div>
                        <label>Role Name</label><input type="text" id="roleTitleInput" placeholder="e.g. Owner">
                        <label>Selected Icon: <span id="selected-icon-name" class="text-orange-500">None</span></label>
                        <button id="roleAddBtn" class="btn-add w-full mt-4">ADD TO LIST</button>
                    </div>
                    <div><label>Pick an Icon</label><div class="icon-grid" id="icon-picker"></div></div>
                </div>
                <div id="role-list" class="sort-list mt-6"></div>
                <button onclick="syncList('role-list', 'networkRoles')" class="btn-save">Sync Roles</button>
            </div>
        </div>

        <div id="page-config" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-box">
                    <h2 class="section-title">Visuals (Drag & Drop)</h2>
                    <label>Background Image</label>
                    <div class="drop-zone" ondragover="hOver(event)" ondragleave="hLeave(event)" ondrop="hDrop(event, 'bgImageUrl')">
                        <input type="text" id="bgImageUrl">
                    </div>
                    <label>Logo URL</label>
                    <div class="drop-zone" ondragover="hOver(event)" ondragleave="hLeave(event)" ondrop="hDrop(event, 'logoUrl')">
                        <input type="text" id="logoUrl">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div><label>Nav BG</label><input type="color" id="navBg"></div>
                        <div><label>Accent</label><input type="color" id="heroBtnBg"></div>
                    </div>
                    <button onclick="saveBranding()" class="btn-save">Save Branding</button>
                </div>
                <div class="section-box">
                    <h2 class="section-title">Lists & Sorting</h2>
                    <label>Server IP</label><input type="text" id="serverIp">
                    <label>SMPs</label>
                    <div class="flex gap-2"><input type="text" id="smpInput"><button id="smpAdd" class="btn-add">+</button></div>
                    <div id="smp-list" class="sort-list"></div>
                    <button onclick="syncList('smp-list', 'smpList')" class="btn-save">Save SMP List</button>
                </div>
            </div>
        </div>

        <div id="page-access" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-box">
                    <h2 class="section-title">Admins (Full Control)</h2>
                    <div class="flex gap-2 mt-4"><input type="text" id="adminEmailInput"><button id="adminEmailAdd" class="btn-add">+</button></div>
                    <div id="admin-email-list" class="sort-list"></div>
                    <button onclick="syncList('admin-email-list', 'trustedEmails')" class="btn-save">Save Admins</button>
                </div>
                <div class="section-box">
                    <h2 class="section-title">Staff (Bio Only)</h2>
                    <div class="flex gap-2 mt-4"><input type="text" id="bioEmailInput"><button id="bioEmailAdd" class="btn-add">+</button></div>
                    <div id="bio-email-list" class="sort-list"></div>
                    <button onclick="syncList('bio-email-list', 'bioStaffEmails')" class="btn-save">Save Staff</button>
                </div>
            </div>
        </div>

        <div id="page-logs" class="hidden">
            <div class="section-box">
                <h2 class="section-title">System Activity</h2>
                <div id="log-container" class="bg-black p-4 rounded-xl border border-zinc-800 h-96 overflow-y-auto mt-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
            authDomain: "inferno-realms.firebaseapp.com",
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
            projectId: "inferno-realms",
            appId: "1:669014530995:web:41fd088f6255118c9e89c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const owner = "abeedwehbe@gmail.com";
        
        let currentUser = null, userIsAdmin = false, myKey = "", selIcon = "";
        const icons = ['crown', 'shield', 'shield-check', 'gavel', 'user-cog', 'star', 'code-2', 'wrench', 'hammer', 'terminal', 'swords', 'heart', 'zap'];

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            const snap = await get(ref(db, 'absoluteConfigV3'));
            const d = snap.val() || {};
            const admins = (d.trustedEmails || "").toLowerCase().split(',').map(e => e.trim());
            const bios = (d.bioStaffEmails || "").toLowerCase().split(',').map(e => e.trim());
            const email = user.email.toLowerCase();

            userIsAdmin = email === owner || admins.includes(email);
            if (!userIsAdmin && !bios.includes(email)) { alert("No Access"); auth.signOut(); return; }

            currentUser = user;
            myKey = email.replace(/\./g, '_');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            if (userIsAdmin) {
                ['tab-directory', 'tab-roles', 'tab-config', 'tab-logs'].forEach(i => document.getElementById(i).classList.remove('hidden'));
                if (email === owner) document.getElementById('tab-access').classList.remove('hidden');
                initIconPicker();
                loadDirectory();
                loadLogs();
            }
            loadMyBio();
            syncEverything(d);
        });

        // --- CORE PROFILE LOGIC (FIXED) ---
        window.loadMyBio = async () => {
            document.getElementById('editingStaffKey').value = myKey;
            document.getElementById('editor-title').innerText = "My Profile";
            document.getElementById('cancelMod').classList.add('hidden');
            const s = await get(ref(db, `absoluteConfigV3/staffProfiles/${myKey}`));
            if(s.exists()) fillEditor(s.val());
        };

        window.moderateBio = async (key) => {
            document.getElementById('editingStaffKey').value = key;
            document.getElementById('editor-title').innerText = "Editing: " + key.replace(/_/g,'.');
            document.getElementById('cancelMod').classList.remove('hidden');
            const s = await get(ref(db, `absoluteConfigV3/staffProfiles/${key}`));
            if(s.exists()) { fillEditor(s.val()); switchTab('profile'); }
        };

        function fillEditor(d) {
            document.getElementById('myStaffName').value = d.name || "";
            document.getElementById('myStaffRoleDropdown').value = d.role || "";
            document.getElementById('myStaffBio').value = d.bio || "";
        }

        window.saveCurrentProfile = async () => {
            const key = document.getElementById('editingStaffKey').value;
            const data = {
                name: document.getElementById('myStaffName').value,
                role: document.getElementById('myStaffRoleDropdown').value,
                bio: document.getElementById('myStaffBio').value,
                email: key.replace(/_/g, '.')
            };
            await update(ref(db, `absoluteConfigV3/staffProfiles/${key}`), data);
            logAction(`Updated profile: ${key}`);
            alert("Saved!");
        };

        // --- IMAGE DRAG/DROP ---
        window.hOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('dragover'); };
        window.hLeave = (e) => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); };
        window.hDrop = async (e, id) => {
            e.preventDefault();
            const zone = e.currentTarget;
            zone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if(!file) return;
            zone.classList.add('uploading');
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'ml_default');
            const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById(id).value = data.secure_url;
            zone.classList.remove('uploading');
        };

        // --- SYSTEM LOGS ---
        function logAction(msg) {
            push(ref(db, 'absoluteConfigV3/logs'), { user: currentUser.email, action: msg, time: new Date().toISOString() });
        }
        function loadLogs() {
            onValue(query(ref(db, 'absoluteConfigV3/logs'), limitToLast(30)), snap => {
                const c = document.getElementById('log-container');
                c.innerHTML = "";
                if(snap.val()) Object.values(snap.val()).reverse().forEach(l => {
                    c.innerHTML += `<div class="log-entry"><span class="text-orange-600">[${new Date(l.time).toLocaleTimeString()}]</span> <span class="text-blue-400">${l.user.split('@')[0]}</span>: ${l.action}</div>`;
                });
            });
        }

        // --- DIRECTORY ---
        function loadDirectory() {
            onValue(ref(db, 'absoluteConfigV3/staffProfiles'), snap => {
                const c = document.getElementById('directory-container');
                c.innerHTML = "";
                if(snap.val()) Object.entries(snap.val()).forEach(([k, p]) => {
                    c.innerHTML += `<div class="bg-[#080808] p-4 rounded-xl border border-zinc-800 flex justify-between">
                        <div><p class="text-orange-500 font-bold">${p.name || 'User'}</p><p class="text-[9px] opacity-40">${p.email}</p></div>
                        <button onclick="moderateBio('${k}')" class="bg-zinc-800 px-3 py-1 rounded text-[10px] font-black">EDIT</button>
                    </div>`;
                });
            });
        }

        // --- ICON PICKER & ROLES ---
        function initIconPicker() {
            const c = document.getElementById('icon-picker');
            icons.forEach(i => {
                const d = document.createElement('div'); d.className="icon-option"; d.innerHTML=`<i data-lucide="${i}"></i>`;
                d.onclick = () => { document.querySelectorAll('.icon-option').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); selIcon=i; document.getElementById('selected-icon-name').innerText=i; };
                c.appendChild(d);
            });
            lucide.createIcons();
        }

        document.getElementById('roleAddBtn').onclick = () => {
            const t = document.getElementById('roleTitleInput').value;
            if(t && selIcon) { addItem('role-list', `${t}|${selIcon}`); document.getElementById('roleTitleInput').value=""; }
        };

        // --- SYNC TOOLS ---
        window.syncList = async (id, key) => {
            const items = Array.from(document.getElementById(id).querySelectorAll('.sort-item')).map(i => i.querySelector('.data-txt').innerText).join(',');
            await set(ref(db, `absoluteConfigV3/${key}`), items);
            logAction(`Synced list: ${key}`);
            alert("Synced!");
            if(key === 'networkRoles') refreshRoleDropdown(items);
        };

        window.addItem = (id, val) => {
            const d = document.createElement('div'); d.className='sort-item';
            d.innerHTML = `<span class="data-txt ${val.includes('|')?'text-orange-500 font-bold':''}">${val}</span><button onclick="this.parentElement.remove()">×</button>`;
            document.getElementById(id).appendChild(d);
        };

        function refreshRoleDropdown(str) {
            const s = document.getElementById('myStaffRoleDropdown');
            s.innerHTML = '<option value="">Select Role...</option>';
            if(str) str.split(',').forEach(r => { 
                const name = r.split('|')[0];
                s.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        window.switchTab = (id) => {
            ['profile', 'directory', 'roles', 'config', 'access', 'logs'].forEach(t => {
                if(document.getElementById('page-'+t)) document.getElementById('page-'+t).classList.toggle('hidden', t !== id);
                if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.toggle('active', t === id);
            });
        };

        async function syncEverything(d) {
            if(!d) return;
            const map = {'role-list':'networkRoles', 'smp-list':'smpList', 'admin-email-list':'trustedEmails', 'bio-email-list':'bioStaffEmails'};
            Object.entries(map).forEach(([id, k]) => {
                if(d[k] && document.getElementById(id)) { document.getElementById(id).innerHTML=""; d[k].split(',').forEach(v => addItem(id, v.trim())); }
            });
            refreshRoleDropdown(d.networkRoles);
            ['bgImageUrl', 'logoUrl', 'navBg', 'heroBtnBg', 'serverIp'].forEach(f => {
                if(d[f] && document.getElementById(f)) document.getElementById(f).value = d[f];
            });
        }

        ['smp', 'adminEmail', 'bioEmail'].forEach(x => {
            const b = document.getElementById(x+'Add');
            if(b) b.onclick = () => { const i = document.getElementById(x+'Input'); addItem(x==='smp'?'smp-list':x==='adminEmail'?'admin-email-list':'bio-email-list', i.value); i.value=''; };
        });

        ['role-list', 'smp-list', 'admin-email-list', 'bio-email-list'].forEach(id => {
            if(document.getElementById(id)) new Sortable(document.getElementById(id), { animation: 150 });
        });
    </script>
</body>
</html>
