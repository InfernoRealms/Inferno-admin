<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet the Staff | Inferno Realms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0a0a0a no-repeat center center fixed; background-size: cover; color: #eee; font-family: sans-serif; }
        .glass { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pt-32">
    <nav class="fixed top-0 w-full z-50 nav-glass py-4 px-6 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-3">
            <i data-lucide="flame" class="text-orange-500"></i>
            <span class="font-black text-xl tracking-tighter uppercase italic text-white">Inferno <span class="text-orange-500">Realms</span></span>
        </a>
        <a href="index.html" class="px-6 py-2 bg-orange-600 rounded-full font-black text-[10px] uppercase hover:scale-105 transition text-white">Back to Home</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div class="relative h-64 rounded-[3rem] overflow-hidden flex items-center mb-20 px-12 border-l-[16px] border-orange-600 glass">
            <div class="z-10">
                <h1 class="text-6xl font-[1000] italic uppercase tracking-tighter text-white">Meet The <span class="text-orange-600">Team</span></h1>
                <p class="text-zinc-400 uppercase font-black tracking-[0.2em] text-xs mt-2">The staff behind the network</p>
            </div>
        </div>

        <div id="staff-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
            authDomain: "inferno-realms.firebaseapp.com",
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
            projectId: "inferno-realms",
            appId: "1:669014530995:web:41fd088f6255118c9e89c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'absoluteConfigV3'), (snap) => {
            const d = snap.val(); if (!d) return;
            document.body.style.backgroundImage = d.bgImageUrl ? `url('${d.bgImageUrl}')` : "";
            
            if (d.staffProfiles) {
                document.getElementById('staff-grid').innerHTML = Object.values(d.staffProfiles).map(p => `
                    <div class="glass p-8 rounded-[3rem] border-b-8 border-orange-600/20 hover:border-orange-600 transition-all duration-500">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="h-14 w-14 bg-orange-600 rounded-2xl flex items-center justify-center font-black text-2xl italic text-white">${p.name[0]}</div>
                            <div>
                                <h3 class="text-2xl font-black uppercase italic tracking-tighter text-white">${p.name}</h3>
                                <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">${p.role}</span>
                            </div>
                        </div>
                        <p class="text-zinc-400 text-sm italic leading-relaxed border-l-2 border-zinc-800 pl-4">${p.bio || 'This staff member is busy working on the server!'}</p>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
