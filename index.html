<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inferno Admin | V8.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 40px; }
        .section-box { background: #111; padding: 24px; border-radius: 20px; border: 1px solid #222; margin-bottom: 24px; position: relative; }
        .section-title { font-size: 14px; font-weight: 900; color: #ea580c; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; margin-top: 15px; }
        input, select { background: #000 !important; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white !important; width: 100%; font-size: 13px; outline: none; }
        .nav-tab { cursor: pointer; padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 12px; transition: 0.3s; }
        .nav-tab.active { background: #ea580c; color: white; }
        .sort-list { background: #080808; border-radius: 12px; padding: 10px; min-height: 80px; border: 1px solid #222; margin-top: 8px; }
        .sort-item { background: #1a1a1a; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; font-size: 11px; }
        .btn-add { background: #ea580c; color: white; padding: 0 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .mini-refresh { cursor: pointer; color: #ea580c; font-size: 12px; margin-left: 8px; vertical-align: middle; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="max-w-md w-full bg-[#111] p-10 rounded-[30px] border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-3xl font-black italic text-orange-600 mb-6 uppercase">Inferno Auth</h2>
            <button id="loginBtn" class="w-full py-4 bg-orange-600 rounded-xl font-black uppercase">Sign in with Google</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase tracking-tighter">Inferno Dashboard</h1>
            <div class="flex gap-2 bg-[#111] p-1.5 rounded-xl border border-zinc-800">
                <button onclick="switchTab('config')" id="tab-config" class="nav-tab active">CONFIG</button>
                <button onclick="switchTab('logs')" id="tab-logs" class="nav-tab">ACTIVITY</button>
                <button onclick="switchTab('access')" id="tab-access" class="nav-tab">EMAILS</button>
            </div>
        </div>

        <div id="page-config">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="section-box">
                    <h2 class="section-title">Branding</h2>
                    <label>Background URL <span class="mini-refresh" onclick="syncField('bgImageUrl')">↻</span></label><input type="text" id="bgImageUrl">
                    <label>Logo Icon URL <span class="mini-refresh" onclick="syncField('logoUrl')">↻</span></label><input type="text" id="logoUrl">
                    <div class="grid grid-cols-4 gap-2 mt-4 text-center">
                        <div><label>Nav</label><input type="color" id="navBg" onchange="syncField('navBg')"></div>
                        <div><label>Logo</label><input type="color" id="navLogoCol" onchange="syncField('navLogoCol')"></div>
                        <div><label>Hero</label><input type="color" id="heroTitleCol" onchange="syncField('heroTitleCol')"></div>
                        <div><label>Btn</label><input type="color" id="heroBtnBg" onchange="syncField('heroBtnBg')"></div>
                    </div>
                </div>

                <div class="section-box">
                    <h2 class="section-title">Hero & IP</h2>
                    <label>Hero Title <span class="mini-refresh" onclick="syncField('heroTitle')">↻</span></label><input type="text" id="heroTitle">
                    <label>Server IP <span class="mini-refresh" onclick="syncField('serverIp')">↻</span></label><input type="text" id="serverIp">
                    <label>Shuffle Delay (Sec) <span class="mini-refresh" onclick="syncField('shuffleDelay')">↻</span></label><input type="number" id="shuffleDelay">
                </div>
            </div>

            <div class="section-box">
                <h2 class="section-title">YouTube Widget Controls</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div><label>Status</label><select id="widgetActive" onchange="syncField('widgetActive')"><option value="false">OFF</option><option value="true">ON</option></select></div>
                    <div><label>Widget Text <span class="mini-refresh" onclick="syncField('widgetText')">↻</span></label><input type="text" id="widgetText"></div>
                    <div><label>Icon URL <span class="mini-refresh" onclick="syncField('widgetIconUrl')">↻</span></label><input type="text" id="widgetIconUrl"></div>
                </div>
            </div>

            <div class="section-box">
                <h2 class="section-title">Public Lists & Vote Links</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label>Media Links <span class="mini-refresh" onclick="syncList('media-list', 'mediaUrls')">↻</span></label>
                        <div class="flex gap-2"><input type="text" id="mediaInput"><button id="mediaAdd" class="btn-add">+</button></div>
                        <div id="media-list" class="sort-list"></div>
                    </div>
                    <div>
                        <label>Vote Links <span class="mini-refresh" onclick="syncList('vote-list', 'voteLinks')">↻</span></label>
                        <div class="flex gap-2"><input type="text" id="voteInput"><button id="voteAdd" class="btn-add">+</button></div>
                        <div id="vote-list" class="sort-list"></div>
                    </div>
                    <div>
                        <label>SMPs <span class="mini-refresh" onclick="syncList('smp-list', 'smpList')">↻</span></label>
                        <div class="flex gap-2"><input type="text" id="smpInput"><button id="smpAdd" class="btn-add">+</button></div>
                        <div id="smp-list" class="sort-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-logs" class="hidden"><div class="section-box h-96 overflow-y-auto" id="log-container"></div></div>
        <div id="page-access" class="hidden"><div class="section-box"><h2 class="section-title">Emails</h2><div class="flex gap-2 mt-4"><input type="text" id="emailInput"><button id="emailAdd" class="btn-add">+</button></div><div id="email-list" class="sort-list"></div></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlQCSwnsipkEV7ZYYEa3bcO-DoNxvWdtc",
            authDomain: "inferno-realms.firebaseapp.com",
            databaseURL: "https://inferno-realms-default-rtdb.firebaseio.com/",
            projectId: "inferno-realms",
            appId: "1:669014530995:web:41fd088f6255118c9e89c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const ownerEmail = "abeedwehbe@gmail.com";

        // Auth
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'absoluteConfigV3/trustedEmails'));
                const trusted = (snap.val() || "").split(',');
                if (user.email === ownerEmail || trusted.includes(user.email)) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    syncEverything();
                }
            }
        });

        window.syncField = async (id) => {
            const val = document.getElementById(id).value;
            await set(ref(db, `absoluteConfigV3/${id}`), val);
            await push(ref(db, 'systemLogs'), { user: auth.currentUser.email, action: `Updated ${id}`, time: new Date().toLocaleTimeString() });
            alert("Saved!");
        };

        window.syncList = async (listId, key) => {
            const items = Array.from(document.getElementById(listId).querySelectorAll('span')).map(s => s.innerText).join(',');
            await set(ref(db, `absoluteConfigV3/${key}`), items);
            alert("List Saved!");
        };

        const addItem = (listId, val) => {
            const div = document.createElement('div');
            div.className = 'sort-item';
            div.innerHTML = `<span>${val}</span><button onclick="this.parentElement.remove()">×</button>`;
            document.getElementById(listId).appendChild(div);
        };

        ['media', 'vote', 'smp', 'email'].forEach(x => {
            document.getElementById(x + 'Add').onclick = () => {
                addItem(x + '-list', document.getElementById(x + 'Input').value);
                document.getElementById(x + 'Input').value = '';
            };
        });

        const syncEverything = async () => {
            const snap = await get(ref(db, 'absoluteConfigV3'));
            const d = snap.val(); if (!d) return;
            const fields = ["bgImageUrl", "logoUrl", "navBg", "navLogoCol", "heroTitleCol", "heroBtnBg", "heroTitle", "serverIp", "shuffleDelay", "widgetActive", "widgetText", "widgetIconUrl"];
            fields.forEach(f => { if(d[f]) document.getElementById(f).value = d[f] });
            const lists = { 'media-list': 'mediaUrls', 'vote-list': 'voteLinks', 'smp-list': 'smpList', 'email-list': 'trustedEmails' };
            Object.entries(lists).forEach(([id, key]) => {
                document.getElementById(id).innerHTML = "";
                if(d[key]) d[key].split(',').forEach(v => addItem(id, v));
            });
        };

        window.switchTab = (id) => {
            ['config', 'logs', 'access'].forEach(t => {
                document.getElementById('page-'+t).classList.toggle('hidden', t !== id);
                document.getElementById('tab-'+t).classList.toggle('active', t === id);
            });
        };

        onValue(ref(db, 'systemLogs'), s => {
            const d = s.val(); if(!d) return;
            document.getElementById('log-container').innerHTML = Object.values(d).reverse().map(l => `<div class="py-2 border-b border-white/5 text-[10px] uppercase"><b>[${l.time}]</b> ${l.user}: ${l.action}</div>`).join('');
        });

        ['media-list', 'vote-list', 'smp-list'].forEach(id => new Sortable(document.getElementById(id), { animation: 150 }));
    </script>
</body>
</html>
